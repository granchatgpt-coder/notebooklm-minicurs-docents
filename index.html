icurs i ha de ser un recurs que puguis utilitzar directament en la teva pr脙聽ctica docent.\n\nAquesta tasca 脙漏s la culminaci脙鲁 del curs \"NotebookLM per a Docents: Potenciant l'Aula amb IA\" i et permetr脙聽 demostrar que pots usar aquesta eina de forma efectiva, creativa i 脙篓tica.","dur":"10 minuts","icon":"冒聼聫聠","id":"TF-01-ca","lang":"ca","mod":5,"modTitle":"冒聼聫聠 Tasca Final: El Teu Notebook Docent Complet","obj":"Integrar tot all脙虏 apr脙篓s en els 4 m脙虏duls creant un notebook docent complet i funcional, llest per usar a l'aula, que demostri el domini de totes les compet脙篓ncies del curs.","order":37,"title":"Descripci脙鲁 de la Tasca Final","type":"Tasca Final"},{"content":"El teu notebook docent complet ha d'incloure:\n\nREQUISIT 1 - NOTEBOOK CONFIGURAT (M脙虏dul 1):\n- Notebook creat amb nom descriptiu.\n- M脙颅nim 5 fonts de qualitat carregades (variades en tipus).\n- Guia del notebook revisada i verificada.\n\nREQUISIT 2 - MATERIALS DID脙聙CTICS (M脙虏dul 2):\n- 1 Guia d'estudi completa.\n- 1 Examen o avaluaci脙鲁 multinivell.\n- 1 Glossari d'almenys 15 termes.\n- 1 Audio Overview generat i avaluat.\n\nREQUISIT 3 - METODOLOGIA ACTIVA (M脙虏dul 3):\n- 1 Disseny d'activitat amb metodologia activa (ABP, Flipped, Gamificaci脙鲁 o altra).\n- 1 Material diferenciat en almenys 2 nivells.\n\nREQUISIT 4 - 脙聢TICA I VERIFICACI脙聯 (M脙虏dul 4):\n- Auditoria documentada d'almenys 1 material generat.\n- Reflexi脙鲁 sobre 脙潞s 脙篓tic (m脙颅nim 300 paraules).\n- Aplicaci脙鲁 del marc VERIFY a una resposta del notebook.","dur":"60 minuts","icon":"冒聼聫聠","id":"TF-02-ca","lang":"ca","mod":5,"modTitle":"冒聼聫聠 Tasca Final: El Teu Notebook Docent Complet","obj":"Integrar tot all脙虏 apr脙篓s en els 4 m脙虏duls creant un notebook docent complet i funcional, llest per usar a l'aula, que demostri el domini de totes les compet脙篓ncies del curs.","order":38,"title":"Requisits del Projecte","type":"Tasca Final"},{"content":"EXCEL脗路LENT (9-10):\n- Totes les seccions completes i d'alta qualitat.\n- Materials directament utilitzables a l'aula.\n- Reflexi脙鲁 脙篓tica profunda i personal.\n- Creativitat en el disseny de la metodologia activa.\n- Evid脙篓ncia clara de verificaci脙鲁 i pensament cr脙颅tic.\n\nB脙聣 (7-8):\n- Totes les seccions presents.\n- Materials funcionals amb ajustos menors necessaris.\n- Reflexi脙鲁 脙篓tica adequada.\n- Metodologia activa ben dissenyada.\n\nSUFICIENT (5-6):\n- La majoria de seccions presents.\n- Materials b脙聽sics per脙虏 funcionals.\n- Reflexi脙鲁 脙篓tica superficial.\n- Metodologia activa senzilla.\n\nEN PROGR脙聣S (1-4):\n- Seccions incompletes o absents.\n- Materials que necessiten revisi脙鲁 significativa.\n- Sense reflexi脙鲁 脙篓tica o verificaci脙鲁.\n\nDATA D'ENTREGA: Segons el calendari del curs.\nFORMAT: Enlla脙搂 al notebook de NotebookLM + document amb els materials generats i la reflexi脙鲁.","dur":"5 minuts","icon":"冒聼聫聠","id":"TF-03-ca","lang":"ca","mod":5,"modTitle":"冒聼聫聠 Tasca Final: El Teu Notebook Docent Complet","obj":"Integrar tot all脙虏 apr脙篓s en els 4 m脙虏duls creant un notebook docent complet i funcional, llest per usar a l'aula, que demostri el domini de totes les compet脙篓ncies del curs.","order":39,"title":"R脙潞brica d'Avaluaci脙鲁","type":"Tasca Final"},{"content":"Actua com un avaluador educatiu expert. Revisa tot el contingut d'aquest notebook i avalua:\n\n1. COBERTURA: Els materials cobreixen adequadament els objectius d'aprenentatge de la unitat?\n2. COHER脙聢NCIA: Hi ha alineaci脙鲁 entre la guia d'estudi, l'avaluaci脙鲁 i el glossari?\n3. NIVELL: El llenguatge i la dificultat s脙鲁n apropiats per al nivell educatiu indicat?\n4. QUALITAT: Els exercicis i les preguntes s脙鲁n clars, rellevants i ben formulats?\n5. BUITS: Hi ha aspectes importants del tema que no s'han cobert?\n\nProporciona una puntuaci脙鲁 de l'1 al 10 per a cada criteri i suggeriments espec脙颅fics de millora.","dur":"2 minuts","icon":"冒聼聫聠","id":"TF-04-ca","lang":"ca","mod":5,"modTitle":"冒聼聫聠 Tasca Final: El Teu Notebook Docent Complet","obj":"Integrar tot all脙虏 apr脙篓s en els 4 m脙虏duls creant un notebook docent complet i funcional, llest per usar a l'aula, que demostri el domini de totes les compet脙篓ncies del curs.","order":40,"title":"Prompt Copiable: Autoavaluaci脙鲁 del Teu Notebook Docent","type":"Prompt Copiable"},{"content":"- Comen脙搂a per all脙虏 que ja tinguis: puja materials que ja usis i millora'ls amb IA.\n- No busquis la perfecci脙鲁 en la primera iteraci脙鲁. Genera, revisa, millora, repeteix.\n- Demana a un company o companya que revisi el teu notebook: una mirada fresca detecta all脙虏 que tu no veus.\n- Desa una c脙虏pia dels millors prompts que descobreixis durant el proc脙漏s.\n- Recorda: l'objectiu no 脙漏s que la IA faci la teva feina, sin脙鲁 que t'alliberi temps per al que m脙漏s importa: connectar amb els teus estudiants.\n\nEnhorabona per completar el minicurs! Ara tens les eines per transformar la teva pr脙聽ctica docent amb IA de forma responsable i efectiva.","dur":"5 minuts","icon":"冒聼聫聠","id":"TF-05-ca","lang":"ca","mod":5,"modTitle":"冒聼聫聠 Tasca Final: El Teu Notebook Docent Complet","obj":"Integrar tot all脙虏 apr脙篓s en els 4 m脙虏duls creant un notebook docent complet i funcional, llest per usar a l'aula, que demostri el domini de totes les compet脙篓ncies del curs.","order":41,"title":"Consells Finals per a l'脙聢xit","type":"Consell Pro"},{"content":"NotebookLM es una herramienta de Google basada en IA (Gemini) que permite crear espacios de trabajo inteligentes alimentados con TUS propios documentos. A diferencia de ChatGPT o Gemini genericos, NotebookLM SOLO responde basandose en las fuentes que tu subes, lo que significa: respuestas fundamentadas (no inventadas), citas verificables con referencias a tus documentos, un \"cerebro artificial\" especializado en tu asignatura. Piensa en ello como tener un asistente docente que ha leido TODO tu material y puede responder preguntas, generar resumenes y crear contenido basado exclusivamente en tu curriculo.","dur":"10 minutos","icon":"冒聼搂聽","id":"M1-01-es","lang":"es","mod":1,"modTitle":"冒聼搂聽 Modulo 1: Construyendo el \"Cerebro\" de tu Asignatura","obj":"Aprender a crear y configurar un notebook especializado en NotebookLM, alimentandolo con fuentes de calidad para convertirlo en un asistente experto en tu materia.","order":1,"title":"Que es NotebookLM y por que es revolucionario para docentes?","type":"Explicaci脙鲁n"},{"content":"1. Accede a notebooklm.google.com con tu cuenta de Google (preferiblemente la institucional).\n2. Haz clic en \"Nuevo Notebook\" (+ New Notebook).\n3. Nombralo de forma descriptiva, por ejemplo: \"Biologia 3ro ESO - Celula y Genetica\" o \"Historia 2do Bach - Siglo XX\".\n\nIMPORTANTE: Cada notebook es un espacio aislado. Crea uno por asignatura, unidad didactica o proyecto. Esto mantiene las respuestas de la IA enfocadas y precisas.","dur":"5 minutos","icon":"冒聼搂聽","id":"M1-02-es","lang":"es","mod":1,"modTitle":"冒聼搂聽 Modulo 1: Construyendo el \"Cerebro\" de tu Asignatura","obj":"Aprender a crear y configurar un notebook especializado en NotebookLM, alimentandolo con fuentes de calidad para convertirlo en un asistente experto en tu materia.","order":2,"title":"Paso 1 - Crear tu primer Notebook","type":"Explicaci脙鲁n"},{"content":"NotebookLM acepta multiples tipos de fuentes (hasta 50 por notebook):\n\n- Google Docs: Apuntes, programaciones, rubricas.\n- PDFs: Libros de texto, articulos cientificos, normativas.\n- URLs/Paginas web: Articulos de referencia, recursos en linea.\n- Texto copiado: Fragmentos relevantes que quieras incluir.\n- Google Slides: Presentaciones de clase.\n- YouTube: Videos educativos (extrae y analiza el contenido).\n\nCONSEJOS PARA SELECCIONAR FUENTES:\n- Prioriza documentos oficiales del curriculo.\n- Incluye tu programacion didactica.\n- Anade materiales que ya uses en clase.\n- Sube ejemplos de examenes o actividades anteriores.\n- Cuanto mas especifico y de calidad sea el material, mejores seran las respuestas.","dur":"5 minutos","icon":"冒聼搂聽","id":"M1-03-es","lang":"es","mod":1,"modTitle":"冒聼搂聽 Modulo 1: Construyendo el \"Cerebro\" de tu Asignatura","obj":"Aprender a crear y configurar un notebook especializado en NotebookLM, alimentandolo con fuentes de calidad para convertirlo en un asistente experto en tu materia.","order":3,"title":"Paso 2 - Alimentar el Notebook con Fuentes de Calidad","type":"Explicaci脙鲁n"},{"content":"Una vez subidas las fuentes, NotebookLM genera automaticamente una \"Guia del Notebook\" con:\n\n- Resumen general: Vision panoramica de todo el contenido.\n- Temas clave: Los conceptos principales detectados.\n- Preguntas sugeridas: Preguntas que puedes hacer directamente.\n\nEsta guia es tu punto de partida para interactuar con el notebook. Revisala para verificar que la IA ha comprendido correctamente tu material.","dur":"5 minutos","icon":"冒聼搂聽","id":"M1-04-es","lang":"es","mod":1,"modTitle":"冒聼搂聽 Modulo 1: Construyendo el \"Cerebro\" de tu Asignatura","obj":"Aprender a crear y configurar un notebook especializado en NotebookLM, alimentandolo con fuentes de calidad para convertirlo en un asistente experto en tu materia.","order":4,"title":"Paso 3 - Explorar la Guia del Notebook","type":"Explicaci脙鲁n"},{"content":"INSTRUCCIONES:\n1. Crea un nuevo notebook para una de tus asignaturas.\n2. Sube al menos 3-5 fuentes variadas (PDF del libro, tu programacion, un articulo web).\n3. Revisa la Guia del Notebook generada automaticamente.\n4. Haz 3 preguntas de prueba al notebook para verificar la calidad de las respuestas.\n\nVERIFICACION: Las respuestas deben incluir citas numeradas que puedes clicar para ver la fuente original. Si las respuestas son vagas, anade fuentes mas especificas.","dur":"15 minutos","icon":"冒聼搂聽","id":"M1-05-es","lang":"es","mod":1,"modTitle":"冒聼搂聽 Modulo 1: Construyendo el \"Cerebro\" de tu Asignatura","obj":"Aprender a crear y configurar un notebook especializado en NotebookLM, alimentandolo con fuentes de calidad para convertirlo en un asistente experto en tu materia.","order":5,"title":"Actividad Practica: Crea tu Notebook Docente","type":"Actividad Pr脙隆ctica"},{"content":"Basandote exclusivamente en las fuentes cargadas, genera un resumen estructurado de los 5 temas principales que cubren estos materiales. Para cada tema, indica: (1) concepto central, (2) subtemas relacionados, y (3) en que fuente especifica se encuentra. Presenta la informacion en formato de tabla.","dur":"2 minutos","icon":"冒聼搂聽","id":"M1-06-es","lang":"es","mod":1,"modTitle":"冒聼搂聽 Modulo 1: Construyendo el \"Cerebro\" de tu Asignatura","obj":"Aprender a crear y configurar un notebook especializado en NotebookLM, alimentandolo con fuentes de calidad para convertirlo en un asistente experto en tu materia.","order":6,"title":"Prompt Copiable: Verificar comprension del Notebook","type":"Prompt Copiable"},{"content":"Analiza todas las fuentes cargadas y detecta posibles vacios o temas que podrian faltar para cubrir completamente una unidad didactica sobre [TEMA]. Sugiere que tipo de material adicional deberia subirse para completar el notebook.","dur":"2 minutos","icon":"冒聼搂聽","id":"M1-07-es","lang":"es","mod":1,"modTitle":"冒聼搂聽 Modulo 1: Construyendo el \"Cerebro\" de tu Asignatura","obj":"Aprender a crear y configurar un notebook especializado en NotebookLM, alimentandolo con fuentes de calidad para convertirlo en un asistente experto en tu materia.","order":7,"title":"Prompt Copiable: Detectar vacios en el material","type":"Prompt Copiable"},{"content":"- Organiza notebooks por trimestre o unidad didactica, no metas todo en uno.\n- Nombra tus fuentes de forma clara antes de subirlas (el nombre del archivo aparece como referencia).\n- Revisa periodicamente las fuentes y actualizalas cuando cambien los contenidos.\n- Comparte el notebook con companeros del departamento para trabajo colaborativo.\n- Usa la funcion \"Anclar nota\" (Pin Note) para guardar las respuestas mas utiles como referencia rapida.","dur":"3 minutos","icon":"冒聼搂聽","id":"M1-08-es","lang":"es","mod":1,"modTitle":"冒聼搂聽 Modulo 1: Construyendo el \"Cerebro\" de tu Asignatura","obj":"Aprender a crear y configurar un notebook especializado en NotebookLM, alimentandolo con fuentes de calidad para convertirlo en un asistente experto en tu materia.","order":8,"title":"Consejos Pro del Modulo 1","type":"Consejo Pro"},{"content":"La calidad del material que genera NotebookLM depende directamente de como formules tus peticiones (prompts). Un buen prompt docente incluye:\n\n- CONTEXTO: Para que nivel educativo, que asignatura.\n- FORMATO: Como quieres que se presente (tabla, lista, texto narrativo, preguntas).\n- RESTRICCIONES: Extension, complejidad, vocabulario adaptado.\n- PROPOSITO: Para que se usara (estudio, evaluacion, repaso, introduccion).\n\nFORMULA MAESTRA PARA PROMPTS DOCENTES:\n\"Genera [TIPO DE MATERIAL] sobre [TEMA] para estudiantes de [NIVEL]. El formato debe ser [FORMATO]. Debe incluir [ELEMENTOS ESPECIFICOS]. El tono debe ser [TONO]. La extension aproximada es [EXTENSION].\"","dur":"5 minutos","icon":"芒職隆","id":"M2-01-es","lang":"es","mod":2,"modTitle":"芒職隆 Modulo 2: Creacion de Materiales Didacticos \"Relampago\"","obj":"Dominar el uso de prompts especificos para generar materiales didacticos de alta calidad en minutos: resumenes, guias de estudio, cuestionarios, glosarios y podcasts de audio.","order":9,"title":"El poder de los prompts bien disenados","type":"Explicaci脙鲁n"},{"content":"NotebookLM puede transformar documentos extensos en resumenes concisos adaptados al nivel de tus estudiantes. Funcionalidades clave:\n\n- Resumenes jerarquicos: De lo general a lo especifico.\n- Guias de estudio estructuradas: Con objetivos, conceptos clave y preguntas de autoevaluacion.\n- Mapas conceptuales textuales: Relaciones entre conceptos presentadas de forma clara.\n- Fichas de repaso: Informacion condensada para repasar antes de examenes.\n\nVENTAJA: Como se basa en TUS fuentes, el resumen esta perfectamente alineado con lo que ensenas, no con informacion generica de internet.","dur":"5 minutos","icon":"芒職隆","id":"M2-02-es","lang":"es","mod":2,"modTitle":"芒職隆 Modulo 2: Creacion de Materiales Didacticos \"Relampago\"","obj":"Dominar el uso de prompts especificos para generar materiales didacticos de alta calidad en minutos: resumenes, guias de estudio, cuestionarios, glosarios y podcasts de audio.","order":10,"title":"Tipo 1 - Resumenes y Guias de Estudio","type":"Explicaci脙鲁n"},{"content":"Crea una guia de estudio completa sobre [TEMA] basandote en las fuentes cargadas. La guia debe incluir:\n1. Objetivos de aprendizaje (3-5 objetivos claros)\n2. Resumen de conceptos clave (maximo 500 palabras)\n3. Vocabulario esencial con definiciones simples\n4. 5 preguntas de autoevaluacion con sus respuestas\n5. Un esquema visual en formato texto que conecte los conceptos principales\n\nAdapta el lenguaje para estudiantes de [NIVEL EDUCATIVO]. Usa un tono cercano pero academico.","dur":"2 minutos","icon":"芒職隆","id":"M2-03-es","lang":"es","mod":2,"modTitle":"芒職隆 Modulo 2: Creacion de Materiales Didacticos \"Relampago\"","obj":"Dominar el uso de prompts especificos para generar materiales didacticos de alta calidad en minutos: resumenes, guias de estudio, cuestionarios, glosarios y podcasts de audio.","order":11,"title":"Prompt Copiable: Generar Guia de Estudio","type":"Prompt Copiable"},{"content":"NotebookLM puede generar evaluaciones de diferentes tipos y niveles de complejidad basadas en la Taxonomia de Bloom:\n\n- RECORDAR: Preguntas de opcion multiple, verdadero/falso, completar espacios.\n- COMPRENDER: Preguntas de explicacion, parafraseo, clasificacion.\n- APLICAR: Problemas practicos, casos de estudio, ejercicios de aplicacion.\n- ANALIZAR: Comparar y contrastar, identificar causas y efectos.\n- EVALUAR: Preguntas de juicio critico, argumentacion, debate.\n- CREAR: Proyectos, disenos, propuestas originales.\n\nPuedes pedir que genere la rubrica de evaluacion junto con las preguntas para mantener coherencia entre lo que ensenas y lo que evaluas.","dur":"5 minutos","icon":"芒職隆","id":"M2-04-es","lang":"es","mod":2,"modTitle":"芒職隆 Modulo 2: Creacion de Materiales Didacticos \"Relampago\"","obj":"Dominar el uso de prompts especificos para generar materiales didacticos de alta calidad en minutos: resumenes, guias de estudio, cuestionarios, glosarios y podcasts de audio.","order":12,"title":"Tipo 2 - Cuestionarios y Evaluaciones","type":"Explicaci脙鲁n"},{"content":"Genera un examen sobre [TEMA] con los siguientes bloques:\n\nBLOQUE A - Conocimiento (4 puntos):\n- 5 preguntas de opcion multiple (4 opciones, solo 1 correcta)\n- 5 preguntas de verdadero/falso con justificacion\n\nBLOQUE B - Comprension y Aplicacion (4 puntos):\n- 2 preguntas de desarrollo corto (maximo 100 palabras cada una)\n- 1 problema practico o caso de estudio\n\nBLOQUE C - Analisis y Evaluacion (2 puntos):\n- 1 pregunta de analisis comparativo\n- 1 pregunta de reflexion critica\n\nIncluye las respuestas correctas en una seccion separada al final. Anade una rubrica simplificada para los bloques B y C.","dur":"2 minutos","icon":"芒職隆","id":"M2-05-es","lang":"es","mod":2,"modTitle":"芒職隆 Modulo 2: Creacion de Materiales Didacticos \"Relampago\"","obj":"Dominar el uso de prompts especificos para generar materiales didacticos de alta calidad en minutos: resumenes, guias de estudio, cuestionarios, glosarios y podcasts de audio.","order":13,"title":"Prompt Copiable: Generar Examen Multinivel","type":"Prompt Copiable"},{"content":"Crea un glosario completo de los terminos clave encontrados en las fuentes sobre [TEMA]. Para cada termino incluye:\n- Definicion clara y concisa (maximo 2 oraciones)\n- Ejemplo practico o analogia para facilitar la comprension\n- Relacion con otros terminos del glosario (indica cuales)\n- Nivel de importancia: ESENCIAL / IMPORTANTE / COMPLEMENTARIO\n\nOrdena los terminos alfabeticamente. Destaca con asterisco (*) los que suelen aparecer en evaluaciones.","dur":"2 minutos","icon":"芒職隆","id":"M2-06-es","lang":"es","mod":2,"modTitle":"芒職隆 Modulo 2: Creacion de Materiales Didacticos \"Relampago\"","obj":"Dominar el uso de prompts especificos para generar materiales didacticos de alta calidad en minutos: resumenes, guias de estudio, cuestionarios, glosarios y podcasts de audio.","order":14,"title":"Prompt Copiable: Generar Glosario Inteligente","type":"Prompt Copiable"},{"content":"Una de las funciones mas innovadoras de NotebookLM es el \"Audio Overview\": genera un podcast conversacional donde dos voces de IA discuten el contenido de tus fuentes de forma natural y didactica.\n\nCOMO GENERARLO:\n1. En tu notebook, busca el boton \"Audio Overview\" o \"Generar resumen de audio\".\n2. Puedes personalizar el enfoque antes de generar.\n3. El audio se genera en unos minutos.\n4. Puedes descargarlo y compartirlo.\n\nUSOS DIDACTICOS:\n- Material de repaso que los estudiantes pueden escuchar en cualquier momento.\n- Introduccion a un tema nuevo antes de la clase presencial (flipped classroom).\n- Recurso de accesibilidad para estudiantes con dificultades de lectura.\n- Contenido para compartir con familias sobre lo que se trabaja en clase.","dur":"5 minutos","icon":"芒職隆","id":"M2-07-es","lang":"es","mod":2,"modTitle":"芒職隆 Modulo 2: Creacion de Materiales Didacticos \"Relampago\"","obj":"Dominar el uso de prompts especificos para generar materiales didacticos de alta calidad en minutos: resumenes, guias de estudio, cuestionarios, glosarios y podcasts de audio.","order":15,"title":"Tipo 3 - Audio Overview (Podcast Educativo con IA)","type":"Explicaci脙鲁n"},{"content":"Genera una conversacion tipo podcast educativo enfocada en [TEMA ESPECIFICO]. El tono debe ser accesible para estudiantes de [NIVEL]. Asegurate de:\n- Explicar los conceptos mas dificiles con analogias cotidianas\n- Incluir al menos 2 ejemplos practicos\n- Hacer preguntas retoricas que inviten a la reflexion\n- Resumir los puntos clave al final de la conversacion\n- No exceder los 10 minutos de duracion estimada","dur":"2 minutos","icon":"芒職隆","id":"M2-08-es","lang":"es","mod":2,"modTitle":"芒職隆 Modulo 2: Creacion de Materiales Didacticos \"Relampago\"","obj":"Dominar el uso de prompts especificos para generar materiales didacticos de alta calidad en minutos: resumenes, guias de estudio, cuestionarios, glosarios y podcasts de audio.","order":16,"title":"Prompt Copiable: Personalizar Audio Overview","type":"Prompt Copiable"},{"content":"Con tu notebook del Modulo 1, genera los siguientes materiales en 30 minutos:\n\n1. GUIA DE ESTUDIO: Usa el prompt proporcionado y adapta al tema de tu notebook. Revisa y ajusta el resultado.\n2. MINI-EXAMEN: Genera un cuestionario de 10 preguntas variadas. Verifica que las respuestas sean correctas consultando las fuentes.\n3. GLOSARIO: Crea un glosario de al menos 15 terminos. Comprueba que las definiciones se alinean con como ensenas esos conceptos.\n4. AUDIO OVERVIEW: Genera un podcast sobre el tema central. Escuchalo y evalua: Lo usarias en clase? Que mejorarias?\n\nREFLEXION: Anota cuanto tiempo te habria tomado crear estos 4 materiales manualmente vs. con NotebookLM.","dur":"30 minutos","icon":"芒職隆","id":"M2-09-es","lang":"es","mod":2,"modTitle":"芒職隆 Modulo 2: Creacion de Materiales Didacticos \"Relampago\"","obj":"Dominar el uso de prompts especificos para generar materiales didacticos de alta calidad en minutos: resumenes, guias de estudio, cuestionarios, glosarios y podcasts de audio.","order":17,"title":"Actividad Practica: Laboratorio de Materiales Expres","type":"Actividad Pr脙隆ctica"},{"content":"- Siempre revisa y edita el material generado antes de darlo a los estudiantes. La IA es tu asistente, no tu reemplazo.\n- Guarda los prompts que mejor funcionan en un documento aparte - son tu \"recetario\" personal.\n- Si el resultado no es satisfactorio, reformula el prompt siendo mas especifico en formato, extension y nivel.\n- Combina materiales: usa el resumen como base para el cuestionario y el glosario como referencia.\n- El Audio Overview funciona mejor cuando el notebook tiene fuentes variadas y bien escritas.","dur":"3 minutos","icon":"芒職隆","id":"M2-10-es","lang":"es","mod":2,"modTitle":"芒職隆 Modulo 2: Creacion de Materiales Didacticos \"Relampago\"","obj":"Dominar el uso de prompts especificos para generar materiales didacticos de alta calidad en minutos: resumenes, guias de estudio, cuestionarios, glosarios y podcasts de audio.","order":18,"title":"Consejos Pro del Modulo 2","type":"Consejo Pro"},{"content":"NotebookLM no es solo un generador de contenido - es una herramienta que puede potenciar metodologias activas de ensenanza. La clave esta en usarlo como un asistente que te ayude a disenar experiencias de aprendizaje, no solo materiales estaticos.\n\nMETODOLOGIAS QUE POTENCIA:\n- Aprendizaje Basado en Proyectos (ABP): Diseno de retos y guias.\n- Flipped Classroom (Aula Invertida): Materiales previos y podcasts.\n- Gamificacion: Creacion de desafios, pistas y narrativas.\n- Aprendizaje Cooperativo: Materiales diferenciados por roles.\n- Ensenanza Personalizada: Adaptacion por niveles.\n- Design Thinking Educativo: Guias de proceso creativo.","dur":"5 minutos","icon":"冒聼聨炉","id":"M3-01-es","lang":"es","mod":3,"modTitle":"冒聼聨炉 Modulo 3: Metodologias Activas y Personalizacion","obj":"Integrar NotebookLM en metodologias activas (ABP, Flipped Classroom, Gamificacion) y aprender a personalizar el aprendizaje adaptando contenidos a diferentes niveles y necesidades.","order":19,"title":"NotebookLM como motor de metodologias activas","type":"Explicaci脙鲁n"},{"content":"NotebookLM puede ayudarte a disenar proyectos completos en minutos:\n\n1. FASE DE DISENO: Pide al notebook que genere un proyecto basado en los contenidos cargados, con pregunta motriz, fases, entregables y criterios de evaluacion.\n2. FASE DE INVESTIGACION: Los estudiantes pueden usar el notebook (si lo compartes) como fuente primaria de investigacion verificada.\n3. FASE DE CREACION: Genera rubricas detalladas y guias de proceso para cada fase del proyecto.\n4. FASE DE PRESENTACION: Crea pautas de evaluacion entre pares y autoevaluacion.\n\nBENEFICIO CLAVE: Todo el proyecto esta anclado en tu curriculo real porque se basa en tus fuentes.","dur":"5 minutos","icon":"冒聼聨炉","id":"M3-02-es","lang":"es","mod":3,"modTitle":"冒聼聨炉 Modulo 3: Metodologias Activas y Personalizacion","obj":"Integrar NotebookLM en metodologias activas (ABP, Flipped Classroom, Gamificacion) y aprender a personalizar el aprendizaje adaptando contenidos a diferentes niveles y necesidades.","order":20,"title":"Estrategia 1 - Aprendizaje Basado en Proyectos (ABP)","type":"Explicaci脙鲁n"},{"content":"Disena un proyecto de Aprendizaje Basado en Proyectos (ABP) para estudiantes de [NIVEL] sobre los contenidos de las fuentes cargadas. El proyecto debe incluir:\n\n1. TITULO CREATIVO del proyecto\n2. PREGUNTA MOTRIZ que despierte curiosidad\n3. CONTEXTO REAL: Conexion con un problema o situacion del mundo real\n4. FASES DEL PROYECTO (4-5 fases con duracion estimada): Para cada fase: descripcion, actividades, recursos necesarios y entregable\n5. ROLES para trabajo en equipo (4-5 roles con responsabilidades)\n6. PRODUCTO FINAL esperado\n7. RUBRICA de evaluacion con 4 niveles (Excelente, Bueno, Suficiente, En progreso)\n8. CRITERIOS de autoevaluacion y coevaluacion\n\nEl proyecto debe ser realizable en [NUMERO] sesiones de clase.","dur":"2 minutos","icon":"冒聼聨炉","id":"M3-03-es","lang":"es","mod":3,"modTitle":"冒聼聨炉 Modulo 3: Metodologias Activas y Personalizacion","obj":"Integrar NotebookLM en metodologias activas (ABP, Flipped Classroom, Gamificacion) y aprender a personalizar el aprendizaje adaptando contenidos a diferentes niveles y necesidades.","order":21,"title":"Prompt Copiable: Disenar un Proyecto ABP Completo","type":"Prompt Copiable"},{"content":"El modelo de Aula Invertida encaja perfectamente con NotebookLM:\n\nANTES DE CLASE (en casa):\n- Genera un Audio Overview como \"podcast de preparacion\".\n- Crea una guia de pre-lectura con preguntas orientadoras.\n- Disena un mini-cuestionario de \"entrada\" para verificar que vieron el material.\n\nDURANTE LA CLASE (presencial):\n- Usa el tiempo para actividades practicas, debates y resolucion de dudas.\n- El notebook puede generar ejercicios de profundizacion en tiempo real.\n- Proyecta preguntas del notebook para discusion grupal.\n\nDESPUES DE CLASE (consolidacion):\n- Genera materiales de refuerzo personalizados.\n- Crea evaluaciones formativas de seguimiento.\n- Disena actividades de extension para quienes quieran ir mas alla.","dur":"5 minutos","icon":"冒聼聨炉","id":"M3-04-es","lang":"es","mod":3,"modTitle":"冒聼聨炉 Modulo 3: Metodologias Activas y Personalizacion","obj":"Integrar NotebookLM en metodologias activas (ABP, Flipped Classroom, Gamificacion) y aprender a personalizar el aprendizaje adaptando contenidos a diferentes niveles y necesidades.","order":22,"title":"Estrategia 2 - Flipped Classroom con NotebookLM","type":"Explicaci脙鲁n"},{"content":"Disena una sesion completa de Aula Invertida sobre [TEMA] para [NIVEL]. Estructura:\n\nPRE-CLASE (trabajo autonomo del estudiante, 20-30 min):\n- Resumen del contenido esencial (maximo 1 pagina)\n- 3 preguntas orientadoras para guiar la lectura/escucha\n- Mini-cuestionario de 5 preguntas rapidas (entrada a clase)\n\nEN CLASE (actividades presenciales, 50 min):\n- Actividad de arranque: dinamica para detectar dudas (10 min)\n- Actividad central: ejercicio practico o colaborativo (25 min)\n- Puesta en comun y resolucion de dudas (15 min)\n\nPOST-CLASE (consolidacion, 15 min):\n- 1 ejercicio de aplicacion individual\n- 1 pregunta de reflexion metacognitiva\n\nIncluye instrucciones claras para el estudiante en cada fase.","dur":"2 minutos","icon":"冒聼聨炉","id":"M3-05-es","lang":"es","mod":3,"modTitle":"冒聼聨炉 Modulo 3: Metodologias Activas y Personalizacion","obj":"Integrar NotebookLM en metodologias activas (ABP, Flipped Classroom, Gamificacion) y aprender a personalizar el aprendizaje adaptando contenidos a diferentes niveles y necesidades.","order":23,"title":"Prompt Copiable: Disenar Sesion Flipped Classroom","type":"Prompt Copiable"},{"content":"Disena una actividad gamificada sobre [TEMA] para [NIVEL] con la siguiente estructura:\n\n- NARRATIVA: Crea una historia o escenario envolvente que contextualice el aprendizaje (ej: \"Sois investigadores que deben resolver un misterio cientifico...\").\n- MISIONES: 5 desafios progresivos (de facil a dificil) basados en el contenido de las fuentes.\n- SISTEMA DE PUNTOS: Como se obtienen puntos, bonus y penalizaciones.\n- PISTAS: Para cada mision, una pista que el docente puede dar si el grupo se atasca.\n- LOGROS/INSIGNIAS: 3 logros desbloqueables por demostrar dominio.\n- JEFE FINAL: Un reto integrador que requiera combinar lo aprendido en todas las misiones.\n\nLas preguntas y retos deben basarse estrictamente en el contenido de las fuentes.","dur":"2 minutos","icon":"冒聼聨炉","id":"M3-06-es","lang":"es","mod":3,"modTitle":"冒聼聨炉 Modulo 3: Metodologias Activas y Personalizacion","obj":"Integrar NotebookLM en metodologias activas (ABP, Flipped Classroom, Gamificacion) y aprender a personalizar el aprendizaje adaptando contenidos a diferentes niveles y necesidades.","order":24,"title":"Prompt Copiable: Crear Actividad Gamificada","type":"Prompt Copiable"},{"content":"Uno de los mayores retos docentes es atender la diversidad del aula. NotebookLM permite generar rapidamente materiales adaptados a diferentes niveles:\n\nNIVEL DE REFUERZO:\n- Explicaciones mas sencillas con analogias cotidianas.\n- Mas ejemplos y ejercicios guiados paso a paso.\n- Vocabulario simplificado.\n\nNIVEL ESTANDAR:\n- Material alineado con los objetivos curriculares.\n- Equilibrio entre teoria y practica.\n\nNIVEL DE AMPLIACION:\n- Contenido adicional y desafios extra.\n- Conexiones interdisciplinares.\n- Preguntas abiertas que fomenten la investigacion autonoma.\n\nNECESIDADES ESPECIFICAS:\n- Textos con lenguaje simplificado para alumnos con dificultades.\n- Versiones mas visuales o esquematicas.\n- Materiales con instrucciones muy pautadas.","dur":"5 minutos","icon":"冒聼聨炉","id":"M3-07-es","lang":"es","mod":3,"modTitle":"冒聼聨炉 Modulo 3: Metodologias Activas y Personalizacion","obj":"Integrar NotebookLM en metodologias activas (ABP, Flipped Classroom, Gamificacion) y aprender a personalizar el aprendizaje adaptando contenidos a diferentes niveles y necesidades.","order":25,"title":"Personalizacion del Aprendizaje con NotebookLM","type":"Explicaci脙鲁n"},{"content":"Genera 3 versiones del mismo material sobre [TEMA], adaptadas a diferentes niveles:\n\nVERSION A - REFUERZO:\n- Explicacion simplificada con analogias cotidianas\n- 3 ejercicios guiados con pistas\n- Vocabulario clave con definiciones sencillas\n- Extension: breve, con apoyo visual descrito\n\nVERSION B - ESTANDAR:\n- Explicacion completa del tema\n- 5 ejercicios de dificultad media\n- Vocabulario tecnico con definiciones\n- 1 pregunta de reflexion\n\nVERSION C - AMPLIACION:\n- Explicacion profunda con conexiones interdisciplinares\n- 3 ejercicios desafiantes + 1 reto de investigacion\n- Pregunta abierta para debate\n- Recurso adicional sugerido\n\nTodas las versiones deben cubrir los mismos objetivos de aprendizaje.","dur":"2 minutos","icon":"冒聼聨炉","id":"M3-08-es","lang":"es","mod":3,"modTitle":"冒聼聨炉 Modulo 3: Metodologias Activas y Personalizacion","obj":"Integrar NotebookLM en metodologias activas (ABP, Flipped Classroom, Gamificacion) y aprender a personalizar el aprendizaje adaptando contenidos a diferentes niveles y necesidades.","order":26,"title":"Prompt Copiable: Generar Material Diferenciado por Niveles","type":"Prompt Copiable"},{"content":"Elige UNA de las siguientes opciones y desarrollala con tu notebook:\n\nOPCION A - PROYECTO ABP: Usa el prompt de ABP para disenar un proyecto completo. Revisa que sea realista y alineado con tu curriculo.\n\nOPCION B - SESION FLIPPED: Disena una sesion invertida completa: genera el audio overview, la guia previa y las actividades presenciales.\n\nOPCION C - GAMIFICACION: Crea una actividad gamificada con al menos 5 misiones. Prueba que las preguntas tengan respuestas verificables en las fuentes.\n\nOPCION D - PERSONALIZACION: Genera material diferenciado (3 niveles) para un tema de tu asignatura. Compara las versiones y ajustalas.\n\nENTREGABLE: El material completo generado + una reflexion de 200 palabras sobre como lo implementarias en tu aula.","dur":"30 minutos","icon":"冒聼聨炉","id":"M3-09-es","lang":"es","mod":3,"modTitle":"冒聼聨炉 Modulo 3: Metodologias Activas y Personalizacion","obj":"Integrar NotebookLM en metodologias activas (ABP, Flipped Classroom, Gamificacion) y aprender a personalizar el aprendizaje adaptando contenidos a diferentes niveles y necesidades.","order":27,"title":"Actividad Practica: Disena tu Experiencia de Aprendizaje","type":"Actividad Pr脙隆ctica"},{"content":"- No intentes implementar todas las metodologias a la vez. Elige una y dominala antes de pasar a otra.\n- Comparte los Audio Overviews mediante un codigo QR que los estudiantes puedan escanear.\n- Para gamificacion, puedes combinar NotebookLM con herramientas como Genially, Kahoot o Classcraft.\n- La personalizacion no significa crear 30 versiones diferentes - 3 niveles bien disenados cubren la mayoria de necesidades.\n- Pide feedback a tus estudiantes sobre los materiales generados. Su opinion es la mejor metrica de calidad.\n- Documenta que prompts y combinaciones funcionaron mejor para compartir con tu departamento.","dur":"3 minutos","icon":"冒聼聨炉","id":"M3-10-es","lang":"es","mod":3,"modTitle":"冒聼聨炉 Modulo 3: Metodologias Activas y Personalizacion","obj":"Integrar NotebookLM en metodologias activas (ABP, Flipped Classroom, Gamificacion) y aprender a personalizar el aprendizaje adaptando contenidos a diferentes niveles y necesidades.","order":28,"title":"Consejos Pro del Modulo 3","type":"Consejo Pro"},{"content":"Incorporar IA en la educacion implica una gran responsabilidad. Como docentes, somos modelos para nuestros estudiantes en el uso de la tecnologia. Debemos abordar:\n\n1. VERACIDAD: La IA puede generar informacion incorrecta o sesgada, incluso cuando se basa en fuentes. Siempre verifica.\n2. AUTORIA Y PLAGIO: Quien es el autor del material generado por IA? Como diferenciamos el uso legitimo del plagio?\n3. PRIVACIDAD: Nunca subas datos personales de estudiantes o informacion sensible a NotebookLM.\n4. EQUIDAD: No todos los estudiantes tienen el mismo acceso a tecnologia. Asegura que la IA no amplie la brecha digital.\n5. TRANSPARENCIA: Los estudiantes deben saber cuando se usa IA en la creacion de materiales.\n6. DEPENDENCIA: La IA es un complemento, no un sustituto del juicio profesional docente.","dur":"5 minutos","icon":"芒職聳茂赂聫","id":"M4-01-es","lang":"es","mod":4,"modTitle":"芒職聳茂赂聫 Modulo 4: Etica y Pensamiento Critico","obj":"Desarrollar un marco etico para el uso de IA en educacion, aprender a verificar y cuestionar las respuestas de la IA, y fomentar el pensamiento critico tanto propio como de los estudiantes.","order":29,"title":"Por que la etica es imprescindible al usar IA en el aula?","type":"Explicaci脙鲁n"},{"content":"Aunque NotebookLM se basa en tus fuentes (lo que reduce las \"alucinaciones\"), SIEMPRE debes verificar:\n\nCHECKLIST DE VERIFICACION:\n- Las citas numeradas corresponden realmente a lo que dice la fuente original?\n- Hay afirmaciones que no estan respaldadas por ninguna fuente?\n- El nivel de complejidad es adecuado para tus estudiantes?\n- Hay errores factuales o conceptuales?\n- La informacion esta actualizada segun tu conocimiento experto?\n- El tono y lenguaje son apropiados para el contexto educativo?\n- Los ejercicios y preguntas tienen respuestas correctas verificables?\n\nREGLA DE ORO: Si no puedes verificar personalmente una respuesta de la IA, no la uses en clase. Tu conocimiento experto como docente es el filtro final e insustituible.","dur":"5 minutos","icon":"芒職聳茂赂聫","id":"M4-02-es","lang":"es","mod":4,"modTitle":"芒職聳茂赂聫 Modulo 4: Etica y Pensamiento Critico","obj":"Desarrollar un marco etico para el uso de IA en educacion, aprender a verificar y cuestionar las respuestas de la IA, y fomentar el pensamiento critico tanto propio como de los estudiantes.","order":30,"title":"Verificacion Critica de las Respuestas de la IA","type":"Explicaci脙鲁n"},{"content":"Revisa criticamente tu ultima respuesta y senala:\n1. Que afirmaciones estan directamente respaldadas por las fuentes? Indica la fuente especifica.\n2. Hay alguna afirmacion que hayas inferido o extrapolado sin base directa en las fuentes? Identificala.\n3. Hay posibles sesgos o perspectivas limitadas en el material generado?\n4. Que informacion importante sobre el tema NO esta cubierta en las fuentes disponibles?\n5. Que nivel de confianza (alto/medio/bajo) asignarias a cada seccion de tu respuesta?\n\nSe honesto y riguroso en esta autoevaluacion.","dur":"2 minutos","icon":"芒職聳茂赂聫","id":"M4-03-es","lang":"es","mod":4,"modTitle":"芒職聳茂赂聫 Modulo 4: Etica y Pensamiento Critico","obj":"Desarrollar un marco etico para el uso de IA en educacion, aprender a verificar y cuestionar las respuestas de la IA, y fomentar el pensamiento critico tanto propio como de los estudiantes.","order":31,"title":"Prompt Copiable: Auditar las Respuestas de la IA","type":"Prompt Copiable"},{"content":"No basta con que tu uses la IA criticamente - debes ensenar a tus estudiantes a hacerlo. Marco VERIFY para estudiantes:\n\nV - VERIFICAR: La informacion coincide con otras fuentes fiables?\nE - EVALUAR: Quien creo el contenido original? Es una fuente autorizada?\nR - RAZONAR: La respuesta tiene logica? Los argumentos estan bien construidos?\nI - IDENTIFICAR: Hay sesgos, omisiones o simplificaciones excesivas?\nF - FUNDAMENTAR: Puedo encontrar evidencia independiente que respalde esto?\nY - Y PREGUNTAR: Que mas necesito saber que la IA no me ha dicho?\n\nACTIVIDAD PARA EL AULA: Da a los estudiantes una respuesta generada por IA (con errores intencionales) y pideles que la evaluen usando el marco VERIFY.","dur":"5 minutos","icon":"芒職聳茂赂聫","id":"M4-04-es","lang":"es","mod":4,"modTitle":"芒職聳茂赂聫 Modulo 4: Etica y Pensamiento Critico","obj":"Desarrollar un marco etico para el uso de IA en educacion, aprender a verificar y cuestionar las respuestas de la IA, y fomentar el pensamiento critico tanto propio como de los estudiantes.","order":32,"title":"Ensenar a los Estudiantes a ser Criticos con la IA","type":"Explicaci脙鲁n"},{"content":"Propuesta de principios para establecer una politica de IA en el aula:\n\n1. TRANSPARENCIA: Informar siempre cuando se usa IA para crear materiales.\n2. SUPERVISION HUMANA: Todo contenido generado por IA debe ser revisado por el docente.\n3. PRIVACIDAD PRIMERO: Nunca cargar datos personales de estudiantes en herramientas de IA.\n4. USO COMO HERRAMIENTA: La IA asiste, no sustituye el proceso de aprendizaje.\n5. EQUIDAD DE ACCESO: Garantizar que todos los estudiantes tengan igual acceso.\n6. PENSAMIENTO CRITICO: Ensenar activamente a cuestionar las respuestas de la IA.\n7. CREATIVIDAD PROTEGIDA: El trabajo creativo original del estudiante debe valorarse sobre el generado por IA.\n8. FORMACION CONTINUA: El profesorado debe actualizarse constantemente en el uso etico de IA.\n\nSUGERENCIA: Adapta estos principios y presentalos a tu claustro o departamento como punto de partida para una politica institucional.","dur":"5 minutos","icon":"芒職聳茂赂聫","id":"M4-05-es","lang":"es","mod":4,"modTitle":"芒職聳茂赂聫 Modulo 4: Etica y Pensamiento Critico","obj":"Desarrollar un marco etico para el uso de IA en educacion, aprender a verificar y cuestionar las respuestas de la IA, y fomentar el pensamiento critico tanto propio como de los estudiantes.","order":33,"title":"Marco Etico para el Uso de IA en tu Centro Educativo","type":"Explicaci脙鲁n"},{"content":"Basandote en las fuentes, genera un material para un debate en clase sobre etica e IA en educacion. Incluye:\n\n1. CASO PRACTICO: Describe un escenario realista donde un estudiante usa IA de forma cuestionable (ej: entregar un trabajo generado por IA como propio).\n2. PREGUNTAS PARA EL DEBATE (5-7 preguntas): Preguntas que presenten dilemas genuinos, no respuestas obvias. Que inviten a considerar multiples perspectivas.\n3. ARGUMENTOS A FAVOR Y EN CONTRA del uso de IA por estudiantes (al menos 3 de cada uno).\n4. CONCLUSIONES ORIENTADORAS: Principios que podrian guiar un \"codigo de uso responsable\" creado por los propios estudiantes.\n\nEl material debe fomentar la reflexion, no imponer una postura unica.","dur":"2 minutos","icon":"芒職聳茂赂聫","id":"M4-06-es","lang":"es","mod":4,"modTitle":"芒職聳茂赂聫 Modulo 4: Etica y Pensamiento Critico","obj":"Desarrollar un marco etico para el uso de IA en educacion, aprender a verificar y cuestionar las respuestas de la IA, y fomentar el pensamiento critico tanto propio como de los estudiantes.","order":34,"title":"Prompt Copiable: Generar Debate Etico sobre IA en Clase","type":"Prompt Copiable"},{"content":"Realiza una auditoria completa de tu trabajo con NotebookLM:\n\n1. VERIFICACION DE CONTENIDO: Toma el ultimo material que generaste y aplica la checklist de verificacion. Identifica al menos 2 puntos que necesitan revision humana.\n2. PRUEBA DE SESGO: Pide al notebook que explique un tema desde dos perspectivas diferentes. Presenta ambas de forma equilibrada?\n3. TEST DE PRIVACIDAD: Revisa todas las fuentes cargadas: Hay datos personales de estudiantes? Si los hay, eliminalos inmediatamente.\n4. EJERCICIO VERIFY: Genera una respuesta sobre un tema que domines bien. Aplica el marco VERIFY como si fueras un estudiante. Documenta que encontraste.\n\nENTREGABLE: Informe breve (1 pagina) con los hallazgos de tu auditoria y un plan de 3 acciones para mejorar tu uso etico de IA.","dur":"20 minutos","icon":"芒職聳茂赂聫","id":"M4-07-es","lang":"es","mod":4,"modTitle":"芒職聳茂赂聫 Modulo 4: Etica y Pensamiento Critico","obj":"Desarrollar un marco etico para el uso de IA en educacion, aprender a verificar y cuestionar las respuestas de la IA, y fomentar el pensamiento critico tanto propio como de los estudiantes.","order":35,"title":"Actividad Practica: Auditoria Etica de tu Notebook","type":"Actividad Pr脙隆ctica"},{"content":"- La verificacion no es opcional - es parte integral del flujo de trabajo con IA.\n- Crea una cultura de clase donde cuestionar la IA sea algo natural y valorado.\n- Documenta los errores que encuentres en las respuestas de NotebookLM. Son excelentes ejemplos didacticos.\n- Actualiza tu politica de IA al menos una vez al ano - la tecnologia evoluciona rapidamente.\n- Involucra a familias y administracion en las conversaciones sobre IA en el aula.\n- Recuerda: la mejor IA del aula sigue siendo tu cerebro de docente.","dur":"3 minutos","icon":"芒職聳茂赂聫","id":"M4-08-es","lang":"es","mod":4,"modTitle":"芒職聳茂赂聫 Modulo 4: Etica y Pensamiento Critico","obj":"Desarrollar un marco etico para el uso de IA en educacion, aprender a verificar y cuestionar las respuestas de la IA, y fomentar el pensamiento critico tanto propio como de los estudiantes.","order":36,"title":"Consejos Pro del Modulo 4","type":"Consejo Pro"},{"content":"Crea un NOTEBOOK DOCENTE COMPLETO para una unidad didactica real de tu asignatura. Este proyecto integra todas las competencias desarrolladas en el minicurso y debe ser un recurso que puedas usar directamente en tu practica docente.\n\nEsta tarea es la culminacion del curso \"NotebookLM para Docentes: Potenciando el Aula con IA\" y te permitira demostrar que puedes usar esta herramienta de forma efectiva, creativa y etica.","dur":"10 minutos","icon":"冒聼聫聠","id":"TF-01-es","lang":"es","mod":5,"modTitle":"冒聼聫聠 Tarea Final: Tu Notebook Docente Completo","obj":"Integrar todo lo aprendido en los 4 modulos creando un notebook docente completo y funcional, listo para usar en el aula, que demuestre dominio de todas las competencias del curso.","order":37,"title":"Descripcion de la Tarea Final","type":"Tarea Final"},{"content":"Tu notebook docente completo debe incluir:\n\nREQUISITO 1 - NOTEBOOK CONFIGURADO (Modulo 1):\n- Notebook creado con nombre descriptivo.\n- Minimo 5 fuentes de calidad cargadas (variadas en tipo).\n- Guia del notebook revisada y verificada.\n\nREQUISITO 2 - MATERIALES DIDACTICOS (Modulo 2):\n- 1 Guia de estudio completa.\n- 1 Examen o evaluacion multinivel.\n- 1 Glosario de al menos 15 terminos.\n- 1 Audio Overview generado y evaluado.\n\nREQUISITO 3 - METODOLOGIA ACTIVA (Modulo 3):\n- 1 Diseno de actividad con metodologia activa (ABP, Flipped, Gamificacion u otra).\n- 1 Material diferenciado en al menos 2 niveles.\n\nREQUISITO 4 - ETICA Y VERIFICACION (Modulo 4):\n- Auditoria documentada de al menos 1 material generado.\n- Reflexion sobre uso etico (minimo 300 palabras).\n- Aplicacion del marco VERIFY a una respuesta del notebook.","dur":"60 minutos","icon":"冒聼聫聠","id":"TF-02-es","lang":"es","mod":5,"modTitle":"冒聼聫聠 Tarea Final: Tu Notebook Docente Completo","obj":"Integrar todo lo aprendido en los 4 modulos creando un notebook docente completo y funcional, listo para usar en el aula, que demuestre dominio de todas las competencias del curso.","order":38,"title":"Requisitos del Proyecto","type":"Tarea Final"},{"content":"EXCELENTE (9-10):\n- Todas las secciones completas y de alta calidad.\n- Materiales directamente utilizables en el aula.\n- Reflexion etica profunda y personal.\n- Creatividad en el diseno de la metodologia activa.\n- Evidencia clara de verificacion y pensamiento critico.\n\nBUENO (7-8):\n- Todas las secciones presentes.\n- Materiales funcionales con ajustes menores necesarios.\n- Reflexion etica adecuada.\n- Metodologia activa bien disenada.\n\nSUFICIENTE (5-6):\n- La mayoria de secciones presentes.\n- Materiales basicos pero funcionales.\n- Reflexion etica superficial.\n- Metodologia activa sencilla.\n\nEN PROGRESO (1-4):\n- Secciones incompletas o ausentes.\n- Materiales que necesitan revision significativa.\n- Sin reflexion etica o verificacion.\n\nFECHA DE ENTREGA: Segun calendario del curso.\nFORMATO: Enlace al notebook de NotebookLM + documento con los materiales generados y la reflexion.","dur":"5 minutos","icon":"冒聼聫聠","id":"TF-03-es","lang":"es","mod":5,"modTitle":"冒聼聫聠 Tarea Final: Tu Notebook Docente Completo","obj":"Integrar todo lo aprendido en los 4 modulos creando un notebook docente completo y funcional, listo para usar en el aula, que demuestre dominio de todas las competencias del curso.","order":39,"title":"Rubrica de Evaluacion","type":"Tarea Final"},{"content":"Actua como un evaluador educativo experto. Revisa todo el contenido de este notebook y evalua:\n\n1. COBERTURA: Los materiales cubren adecuadamente los objetivos de aprendizaje de la unidad?\n2. COHERENCIA: Hay alineacion entre la guia de estudio, la evaluacion y el glosario?\n3. NIVEL: El lenguaje y la dificultad son apropiados para el nivel educativo indicado?\n4. CALIDAD: Los ejercicios y preguntas son claros, relevantes y bien formulados?\n5. VACIOS: Hay aspectos importantes del tema que no se han cubierto?\n\nProporciona una puntuacion del 1-10 para cada criterio y sugerencias especificas de mejora.","dur":"2 minutos","icon":"冒聼聫聠","id":"TF-04-es","lang":"es","mod":5,"modTitle":"冒聼聫聠 Tarea Final: Tu Notebook Docente Completo","obj":"Integrar todo lo aprendido en los 4 modulos creando un notebook docente completo y funcional, listo para usar en el aula, que demuestre dominio de todas las competencias del curso.","order":40,"title":"Prompt Copiable: Autoevaluacion de tu Notebook Docente","type":"Prompt Copiable"},{"content":"- Empieza por lo que ya tengas: sube materiales que ya uses y mejoralos con IA.\n- No busques la perfeccion en la primera iteracion. Genera, revisa, mejora, repite.\n- Pide a un colega que revise tu notebook - una mirada fresca detecta lo que tu no ves.\n- Guarda una copia de los mejores prompts que descubras durante el proceso.\n- Recuerda: el objetivo no es que la IA haga tu trabajo, sino que te libere tiempo para lo que mas importa: conectar con tus estudiantes.\n\nEnhorabuena por completar el minicurso! Ahora tienes las herramientas para transformar tu practica docente con IA de forma responsable y efectiva.","dur":"5 minutos","icon":"冒聼聫聠","id":"TF-05-es","lang":"es","mod":5,"modTitle":"冒聼聫聠 Tarea Final: Tu Notebook Docente Completo","obj":"Integrar todo lo aprendido en los 4 modulos creando un notebook docente completo y funcional, listo para usar en el aula, que demuestre dominio de todas las competencias del curso.","order":41,"title":"Consejos Finales para el Exito","type":"Consejo Pro"},{"content":"NotebookLM Google-ren tresna bat da, IA-n oinarritua (Gemini), zure dokumentuekin elikatutako lan-espazio adimentsuak sortzeko aukera ematen duena. ChatGPT edo Gemini generikoekin alderatuta, NotebookLM-ek SOILIK zuk igotako iturrietan oinarrituta erantzuten du, eta horrek esan nahi du: iturrietan oinarritutako erantzunak (ez asmatuak), zure dokumentuetara egindako erreferentzia egiaztatzaileak, zure irakasgaian espezializatutako \"adimen artifiziala\". Pentsa ezazu zure material guztia irakurri duen eta galderak erantzun, laburpenak sortu eta zure curriculumean soilik oinarritutako edukiak sor ditzakeen irakaskuntza-laguntzaile bat edukitzean.","dur":"10 minutu","icon":"冒聼搂聽","id":"M1-01-eu","lang":"eu","mod":1,"modTitle":"冒聼搂聽 1. Modulua: Zure Irakasgaiaren \"Adimena\" Eraikitzen","obj":"NotebookLM-en notebook espezializatu bat nola sortu eta konfiguratu ikasi, kalitatezkoeturriez elikatuz zure irakasgaiko aditu-laguntzaile bihurtzeko.","order":1,"title":"Zer da NotebookLM eta zergatik da iraultzailea irakasleentzat?","type":"Azalpena"},{"content":"1. Sartu notebooklm.google.com webgunera zure Google kontua erabiliz (ahal bada, instituzionala).\n2. Egin klik \"Notebook berria\" aukeran (+ New Notebook).\n3. Izendatu modu deskriptiboan, adibidez: \"Biologia DBH 3. maila - Zelula eta Genetika\" edo \"Historia Batxilergoa 2. maila - XX. mendea\".\n\nGARRANTZITSUA: Notebook bakoitza espazio isolatu bat da. Sortu bat irakasgai, unitate didaktiko edo proiektu bakoitzeko. Horri esker, IAren erantzunak zentratuak eta zehatzak izango dira.","dur":"5 minutu","icon":"冒聼搂聽","id":"M1-02-eu","lang":"eu","mod":1,"modTitle":"冒聼搂聽 1. Modulua: Zure Irakasgaiaren \"Adimena\" Eraikitzen","obj":"NotebookLM-en notebook espezializatu bat nola sortu eta konfiguratu ikasi, kalitatezkoeturriez elikatuz zure irakasgaiko aditu-laguntzaile bihurtzeko.","order":2,"title":"1. urratsa - Zure lehen Notebook-a sortzea","type":"Azalpena"},{"content":"NotebookLM iturri mota anitz onartzen ditu (notebook bakoitzeko 50 iturri arte):\n\n- Google Docs: Apunteak, programazioak, errubrikak.\n- PDFs: Testu-liburuak, artikulu zientifikoak, araudiak.\n- URLs/Web orriak: Erreferentziazko artikuluak, lineako baliabideak.\n- Kopiatutako testua: Sartu nahi dituzun pasarte garrantzitsuak.\n- Google Slides: Klase-aurkezpenak.\n- YouTube: Hezkuntza-bideoak (edukia erauzi eta aztertzen du).\n\nITURRIAK HAUTATZEKO AHOLKUAK:\n- Eman lehentasuna curriculumeko dokumentu ofizialei.\n- Sartu zure programazio didaktikoa.\n- Gehitu klasean dagoeneko erabiltzen dituzun materialak.\n- Igo azterketen edo aurreko jardueren adibideak.\n- Materiala zenbat eta zehatzagoa eta kalitatezkoa izan, orduan eta hobeak izango dira erantzunak.","dur":"5 minutu","icon":"冒聼搂聽","id":"M1-03-eu","lang":"eu","mod":1,"modTitle":"冒聼搂聽 1. Modulua: Zure Irakasgaiaren \"Adimena\" Eraikitzen","obj":"NotebookLM-en notebook espezializatu bat nola sortu eta konfiguratu ikasi, kalitatezkoeturriez elikatuz zure irakasgaiko aditu-laguntzaile bihurtzeko.","order":3,"title":"2. urratsa - Notebook-a kalitatezkoeturriez elikatzea","type":"Azalpena"},{"content":"Iturriak igota gero, NotebookLM-ek automatikoki \"Notebook-aren Gida\" bat sortzen du, ondokoekin:\n\n- Laburpen orokorra: Eduki guztien ikuspegi panoramikoa.\n- Gai nagusiak: Detektatutako kontzeptu garrantzitsuenak.\n- Iradokitako galderak: Zuzenean egin ditzakezun galderak.\n\nGida hau notebook-arekin elkarreragiteko abiapuntua da. Berrikusi ezazu IAk zure materiala behar bezala ulertu duela egiaztatzeko.","dur":"5 minutu","icon":"冒聼搂聽","id":"M1-04-eu","lang":"eu","mod":1,"modTitle":"冒聼搂聽 1. Modulua: Zure Irakasgaiaren \"Adimena\" Eraikitzen","obj":"NotebookLM-en notebook espezializatu bat nola sortu eta konfiguratu ikasi, kalitatezkoeturriez elikatuz zure irakasgaiko aditu-laguntzaile bihurtzeko.","order":4,"title":"3. urratsa - Notebook-aren Gida aztertzea","type":"Azalpena"},{"content":"ARGIBIDEAK:\n1. Sortu notebook berri bat zure irakasgaietako baterako.\n2. Igo gutxienez 3-5 iturri ezberdin (liburuaren PDF-a, zure programazioa, web-artikulu bat).\n3. Automatikoki sortutako Notebook-aren Gida berrikusi.\n4. Egin 3 proba-galdera notebook-ari erantzunen kalitatea egiaztatzeko.\n\nEGIAZTAPENA: Erantzunek jatorrizko iturria ikusteko klik egin daitezkeen zenbakizko aipuak izan behar dituzte. Erantzunak lausoak badira, gehitu iturri zehatzagoak.","dur":"15 minutu","icon":"冒聼搂聽","id":"M1-05-eu","lang":"eu","mod":1,"modTitle":"冒聼搂聽 1. Modulua: Zure Irakasgaiaren \"Adimena\" Eraikitzen","obj":"NotebookLM-en notebook espezializatu bat nola sortu eta konfiguratu ikasi, kalitatezkoeturriez elikatuz zure irakasgaiko aditu-laguntzaile bihurtzeko.","order":5,"title":"Jarduera Praktikoa: Sortu zure Irakasle Notebook-a","type":"Jarduera Praktikoa"},{"content":"Kargatutako iturrietan soilik oinarrituta, material hauek estaltzen dituzten 5 gai nagusien laburpen egituratu bat sortu. Gai bakoitzeko, adierazi: (1) kontzeptu nagusia, (2) lotutako azpigaiak eta (3) iturri zehatz zeinetan aurkitzen den. Aurkeztu informazioa taula formatuan.","dur":"2 minutu","icon":"冒聼搂聽","id":"M1-06-eu","lang":"eu","mod":1,"modTitle":"冒聼搂聽 1. Modulua: Zure Irakasgaiaren \"Adimena\" Eraikitzen","obj":"NotebookLM-en notebook espezializatu bat nola sortu eta konfiguratu ikasi, kalitatezkoeturriez elikatuz zure irakasgaiko aditu-laguntzaile bihurtzeko.","order":6,"title":"Kopiatzeko Prompt-a: Notebook-aren ulermena egiaztatzea","type":"Kopiatzeko Prompt-a"},{"content":"Aztertu kargatutako iturri guztiak eta detektatu [GAIA] buruzko unitate didaktiko bat osoki estaltzeko falta daitezkeen hutsuneak edo gaiak. Iradoki notebook-a osatzeko igo beharko litzatekeen material mota.","dur":"2 minutu","icon":"冒聼搂聽","id":"M1-07-eu","lang":"eu","mod":1,"modTitle":"冒聼搂聽 1. Modulua: Zure Irakasgaiaren \"Adimena\" Eraikitzen","obj":"NotebookLM-en notebook espezializatu bat nola sortu eta konfiguratu ikasi, kalitatezkoeturriez elikatuz zure irakasgaiko aditu-laguntzaile bihurtzeko.","order":7,"title":"Kopiatzeko Prompt-a: Materialeko hutsuneak detektatzea","type":"Kopiatzeko Prompt-a"},{"content":"- Antolatu notebook-ak hiruhilekoka edo unitate didaktikoka; ez sartu dena bakarrean.\n- Izendatu zure iturriak argi eta garbi igo aurretik (fitxategiaren izena erreferentzia gisa agertzen da).\n- Berrikusi aldizka iturriak eta eguneratu edukiak aldatzen direnean.\n- Partekatu notebook-a departamentuko kideekin lan kolaboratiborako.\n- Erabili \"Oharra ainguratu\" (Pin Note) funtzioa erantzun erabilgarrienak erreferentzia azkar gisa gordetzeko.","dur":"3 minutu","icon":"冒聼搂聽","id":"M1-08-eu","lang":"eu","mod":1,"modTitle":"冒聼搂聽 1. Modulua: Zure Irakasgaiaren \"Adimena\" Eraikitzen","obj":"NotebookLM-en notebook espezializatu bat nola sortu eta konfiguratu ikasi, kalitatezkoeturriez elikatuz zure irakasgaiko aditu-laguntzaile bihurtzeko.","order":8,"title":"1. Moduluko Aholku Aurreratuak","type":"Aholku Aurreratua"},{"content":"NotebookLM-k sortzen duen materialaren kalitatea zuzenean lotuta dago zure eskaerak (prompts) nola formulatzen dituzunarekin. Irakasleen prompt egoki batek hauek ditu:\n\n- TESTUINGURUA: Zein hezkuntza-mailatarako, zein irakasgaitarako.\n- FORMATUA: Nola aurkeztu nahi duzun (taula, zerrenda, testu narratiboa, galderak).\n- MURRIZKETAK: Luzera, konplexutasuna, egokitutako hiztegia.\n- HELBURUA: Zertarako erabiliko den (ikasketa, ebaluazioa, errepasoa, sarrera).\n\nIRAKASLEENTZAKO PROMPT-EN FORMULA NAGUSIA:\n\"Sortu [MATERIAL MOTA] [GAIA] buruz [MAILA]ko ikasleentzat. Formatua [FORMATUA] izan behar da. Honakoak sartu behar ditu: [ELEMENTU ZEHATZAK]. Tonua [TONUA] izan behar da. Gutxi gorabeherako luzera [LUZERA] da.\"","dur":"5 minutu","icon":"芒職隆","id":"M2-01-eu","lang":"eu","mod":2,"modTitle":"芒職隆 2. Modulua: Material Didaktikoen Sorkuntza \"Tximista\"","obj":"Kalitate handiko material didaktikoak minututan sortzeko prompt zehatzen erabilera menperatzea: laburpenak, azterketa-gidak, galdetegiak, hiztegiak eta audio podcastak.","order":9,"title":"Ondo diseinatutako prompt-en ahalmena","type":"Azalpena"},{"content":"NotebookLM-k dokumentu luzeak laburpen zehatzetan bihur ditzake, zure ikasleen mailara egokituta. Funtzio nagusiak:\n\n- Laburpen hierarkikoak: Orokorretatik zehatzetara.\n- Azterketa-gida egituratuak: Helburuak, kontzeptu nagusiak eta autoebaluazio-galderak dituzte.\n- Testu-kontzeptu mapak: Kontzeptuen arteko harremanak modu argian aurkeztuta.\n- Errepaso-fitxak: Azterketen aurretik errepasatzeko informazio trinkotua.\n\nABANTAILA: ZURE iturrietan oinarrituta dagoenez, laburpena ezartzen duzunarekin guztiz bat dator, ez Interneteko informazio orokorrarekin.","dur":"5 minutu","icon":"芒職隆","id":"M2-02-eu","lang":"eu","mod":2,"modTitle":"芒職隆 2. Modulua: Material Didaktikoen Sorkuntza \"Tximista\"","obj":"Kalitate handiko material didaktikoak minututan sortzeko prompt zehatzen erabilera menperatzea: laburpenak, azterketa-gidak, galdetegiak, hiztegiak eta audio podcastak.","order":10,"title":"1. Mota - Laburpenak eta Azterketa-Gidak","type":"Azalpena"},{"content":"Sortu azterketa-gida oso bat [GAIA] buruz, kargatutako iturrietan oinarrituta. Gidak honakoak sartu behar ditu:\n1. Ikaskuntza-helburuak (3-5 helburu argi)\n2. Kontzeptu nagusien laburpena (gehienez 500 hitz)\n3. Definizio sinpleekin osatutako beharrezko hiztegia\n4. Erantzunekin batera 5 autoebaluazio-galdera\n5. Kontzeptu nagusiak lotzen dituen eskema bisual testu-formatuan\n\nEgokitu hizkera [HEZKUNTZA-MAILA]ko ikasleentzat. Erabili tonu hurbilekoa baina akademikoa.","dur":"2 minutu","icon":"芒職隆","id":"M2-03-eu","lang":"eu","mod":2,"modTitle":"芒職隆 2. Modulua: Material Didaktikoen Sorkuntza \"Tximista\"","obj":"Kalitate handiko material didaktikoak minututan sortzeko prompt zehatzen erabilera menperatzea: laburpenak, azterketa-gidak, galdetegiak, hiztegiak eta audio podcastak.","order":11,"title":"Kopiatzeko Prompt-a: Azterketa-Gida Sortzea","type":"Kopiatzeko Prompt-a"},{"content":"NotebookLM-k Bloom-en Taxonomian oinarritutako konplexutasun-maila eta mota desberdinetako ebaluazioak sor ditzake:\n\n- GOGORATU: Aukera anitzeko galderak, egia/gezurra, hutsuneak betetzea.\n- ULERTU: Azalpen-galderak, birformulazio, sailkapena.\n- APLIKATU: Arazo praktikoak, kasu-azterketak, aplikazio-ariketak.\n- AZTERTU: Alderatu eta kontrastatu, kausa eta efektuak identifikatu.\n- EBALUATU: Pentsamendu kritikoko galderak, argumentazioa, eztabaida.\n- SORTU: Proiektuak, diseinuak, jatorrizko proposamenak.\n\nErabaluazio-errubrika ere sor dezakezu galderen ondoan, irakasten duzunaren eta ebaluatzen duzunaren arteko koherentzia mantentzeko.","dur":"5 minutu","icon":"芒職隆","id":"M2-04-eu","lang":"eu","mod":2,"modTitle":"芒職隆 2. Modulua: Material Didaktikoen Sorkuntza \"Tximista\"","obj":"Kalitate handiko material didaktikoak minututan sortzeko prompt zehatzen erabilera menperatzea: laburpenak, azterketa-gidak, galdetegiak, hiztegiak eta audio podcastak.","order":12,"title":"2. Mota - Galdetegiak eta Ebaluazioak","type":"Azalpena"},{"content":"Sortu [GAIA] buruzko azterketa bloke hauek dituena:\n\nA BLOKEA - Ezagutza (4 puntu):\n- 5 aukera anitzeko galdera (4 aukera, 1 zuzena bakarrik)\n- 5 egia/gezurra galdera justifikazioarekin\n\nB BLOKEA - Ulermena eta Aplikazioa (4 puntu):\n- 2 garapen laburreko galdera (gehienez 100 hitz bakoitza)\n- 1 arazo praktiko edo kasu-azterketa\n\nC BLOKEA - Analisia eta Ebaluazioa (2 puntu):\n- 1 analisi konparatiborako galdera\n- 1 hausnarketarako galdera kritikoa\n\nSartu erantzun zuzenak azkeneko atal bereizi batean. Gehitu B eta C blokeetarako errubrika sinplifikatua.","dur":"2 minutu","icon":"芒職隆","id":"M2-05-eu","lang":"eu","mod":2,"modTitle":"芒職隆 2. Modulua: Material Didaktikoen Sorkuntza \"Tximista\"","obj":"Kalitate handiko material didaktikoak minututan sortzeko prompt zehatzen erabilera menperatzea: laburpenak, azterketa-gidak, galdetegiak, hiztegiak eta audio podcastak.","order":13,"title":"Kopiatzeko Prompt-a: Maila Anitzeko Azterketa Sortzea","type":"Kopiatzeko Prompt-a"},{"content":"Sortu [GAIA] buruzko iturrietan aurkitutako gako-terminoen hiztegia. Termino bakoitzeko sartu:\n- Definizio argi eta zehatza (gehienez 2 esaldi)\n- Ulermena errazteko adibide praktikoa edo analogia\n- Hiztegiko beste termino batzuekin duen erlazioa (zeintzuk diren adierazi)\n- Garrantzi-maila: FUNTSEZKOA / GARRANTZITSUA / OSAGARRIA\n\nOrdenatu terminoak alfabetikoki. Ebaluazioetan maiz agertzen direnak asteriskoarekin (*) nabarmendu.","dur":"2 minutu","icon":"芒職隆","id":"M2-06-eu","lang":"eu","mod":2,"modTitle":"芒職隆 2. Modulua: Material Didaktikoen Sorkuntza \"Tximista\"","obj":"Kalitate handiko material didaktikoak minututan sortzeko prompt zehatzen erabilera menperatzea: laburpenak, azterketa-gidak, galdetegiak, hiztegiak eta audio podcastak.","order":14,"title":"Kopiatzeko Prompt-a: Hiztegia Adimentsua Sortzea","type":"Kopiatzeko Prompt-a"},{"content":"NotebookLM-ren funtzio berritzailenetako bat \"Audio Overview\" da: bi IA ahots dituen elkarrizketa-podcast bat sortzen du, zure iturrien edukia modu natural eta didaktikoan eztabaidatzen duena.\n\nNOLA SORTU:\n1. Zure notebook-ean, bilatu \"Audio Overview\" edo \"Generar resumen de audio\" botoia.\n2. Sortu aurretik enfokea pertsonaliza dezakezu.\n3. Audioa minutu batzuetan sortzen da.\n4. Deskargatu eta parteka dezakezu.\n\nERABILERA DIDAKTIKOAK:\n- Ikasleak edozein momentutan entzun dezaketen errepaso-materiala.\n- Aurrezko hezkuntzarako (flipped classroom) klase presentzialaren aurretik gai berri baten sarrera.\n- Irakurketa-zailtasunak dituzten ikasleentzako irisgarritasun-baliabidea.\n- Familiekin klasean lantzen denaren inguruan partekatzeko edukia.","dur":"5 minutu","icon":"芒職隆","id":"M2-07-eu","lang":"eu","mod":2,"modTitle":"芒職隆 2. Modulua: Material Didaktikoen Sorkuntza \"Tximista\"","obj":"Kalitate handiko material didaktikoak minututan sortzeko prompt zehatzen erabilera menperatzea: laburpenak, azterketa-gidak, galdetegiak, hiztegiak eta audio podcastak.","order":15,"title":"3. Mota - Audio Overview (IA-rekin Hezkuntza Podcasta)","type":"Azalpena"},{"content":"Sortu [GAI ZEHATZA] buruzko hezkuntza-podcast moduko elkarrizketa bat. Tonua [MAILA]ko ikasleentzat ulerterraza izan behar da. Ziurtatu:\n- Kontzeptu zailenenak eguneroko analogiekin azaltzea\n- Gutxienez 2 adibide praktiko sartzea\n- Hausnarketa gonbidatzen duten galdera erretorikoak egitea\n- Elkarrizketaren amaieran gako-puntuak laburtzea\n- Estimatutako iraupena ez gainditzea 10 minututan","dur":"2 minutu","icon":"芒職隆","id":"M2-08-eu","lang":"eu","mod":2,"modTitle":"芒職隆 2. Modulua: Material Didaktikoen Sorkuntza \"Tximista\"","obj":"Kalitate handiko material didaktikoak minututan sortzeko prompt zehatzen erabilera menperatzea: laburpenak, azterketa-gidak, galdetegiak, hiztegiak eta audio podcastak.","order":16,"title":"Kopiatzeko Prompt-a: Audio Overview Pertsonalizatzea","type":"Kopiatzeko Prompt-a"},{"content":"Zure 1. Moduluko notebookarekin, sortu ondorengo materialeak 30 minututan:\n\n1. IKASKETA-GIDA: Erabil ezazu emandako prompta eta egokitu zure notebookeko gaira. Berrikusi eta doitu emaitza.\n2. MINI-AZTERKETA: Sortu 10 galdera anitzeko galdetegia. Egiaztatu erantzunak zuzenak direla iturriak kontsultatuz.\n3. GLOSARIOA: Sortu gutxienez 15 terminoko glosario bat. Egiaztatu definizioak bat datozela kontzeptu horiek irakasten dituzun moduarekin.\n4. AUDIO OVERVIEW: Sortu gai nagusiari buruzko podcast bat. Entzun eta ebaluatu: Erabiliko zenuke gelan? Zer hobetuko zenuke?\n\nHAUSNARKETA: Idatzi zenbat denbora beharko zenukeen material horiek eskuz sortzeko NotebookLM-rekin alderatuta.","dur":"30 minutu","icon":"芒職隆","id":"M2-09-eu","lang":"eu","mod":2,"modTitle":"芒職隆 2. Modulua: Material Didaktikoen Sorrera \"Tximistarena\"","obj":"Prompt espezifikoen erabilera menperatzea kalitate altuko material didaktikoak minututan sortzeko: laburpenak, ikasketa-gidak, galdekizunak, glosarioak eta audio podcastak.","order":17,"title":"Praktika-Jarduera: Material Bizkorraren Laborategia","type":"Praktika-Jarduera"},{"content":"- Beti berrikusi eta editatu sortutako materiala ikasleei eman aurretik. IA zure laguntzailea da, ez zure ordezkoa.\n- Gorde ondoen funtzionatzen duten promptak dokumentu berezi batean 芒聙聰 zure \"errezeta-liburua\" pertsonala dira.\n- Emaitza ez bada egokia, berridatzi prompta formatua, luzera eta maila zehazkiago adieraziz.\n- Konbinatu materialeak: erabili laburpena galdekizunaren oinarri gisa eta glosarioa erreferentzia gisa.\n- Audio Overview hobeto funtzionatzen du notebookak iturri anitz eta ondo idatziak dituenean.","dur":"3 minutu","icon":"芒職隆","id":"M2-10-eu","lang":"eu","mod":2,"modTitle":"芒職隆 2. Modulua: Material Didaktikoen Sorrera \"Tximistarena\"","obj":"Prompt espezifikoen erabilera menperatzea kalitate altuko material didaktikoak minututan sortzeko: laburpenak, ikasketa-gidak, galdekizunak, glosarioak eta audio podcastak.","order":18,"title":"2. Moduluko Aholku Profesionalak","type":"Aholku Profesionala"},{"content":"NotebookLM ez da soilik eduki-sorgailu bat 芒聙聰 metodologia aktiboak indartu ditzakeen tresna bat da. Gakoa da hura laguntzaile gisa erabiltzea ikaskuntza-esperientziak diseinatzeko, ez bakarrik material estatikoak sortzeko.\n\nINDARTZEN DITUEN METODOLOGIAK:\n- Proiektuetan Oinarritutako Ikaskuntza (ABP): Erronken eta giden diseinua.\n- Flipped Classroom (Ikasgela Alderantzikatua): Aldez aurreko materialeak eta podcastak.\n- Gamifikazioa: Erronken, pisten eta narrazioen sorrera.\n- Ikaskuntza Kooperatiboa: Rolen araberako material diferentziatuak.\n- Irakaskuntza Pertsonalizatua: Mailaketarako egokitzapena.\n- Hezkuntza Design Thinking: Prozesu sortzailerako gidak.","dur":"5 minutu","icon":"冒聼聨炉","id":"M3-01-eu","lang":"eu","mod":3,"modTitle":"冒聼聨炉 3. Modulua: Metodologia Aktiboak eta Pertsonalizazioa","obj":"NotebookLM metodologia aktiboetan integratzea (ABP, Flipped Classroom, Gamifikazioa) eta ikaskuntza pertsonalizatzen ikastea, edukiak maila eta behar ezberdinetara egokituz.","order":19,"title":"NotebookLM metodologia aktiboen motore gisa","type":"Azalpena"},{"content":"NotebookLM-k proiektu osoak minututan diseinatzen lagun diezazuke:\n\n1. DISEINUAREN FASEA: Eskatu notebookari kargatutako edukietan oinarritutako proiektu bat sortzeko, galdera eragile batekin, faseekin, entregatzekoeekin eta ebaluazio-irizpideekin.\n2. IKERKETAREN FASEA: Ikasleek notebook-a (partekatzen baduzu) ikerketa-iturri nagusi egiaztatu gisa erabil dezakete.\n3. SORKUNTZAREN FASEA: Sortu errubrika zehatzak eta prozesu-gidak proiektuaren fase bakoitzerako.\n4. AURKEZPENAREN FASEA: Sortu ikaskideen arteko ebaluazio eta autoebaluazio-gidak.\n\nFUNTSEZKO ONURA: Proiektu osoa zure curriculum errealean ainguratuta dago, zure iturrietan oinarritzen delako.","dur":"5 minutu","icon":"冒聼聨炉","id":"M3-02-eu","lang":"eu","mod":3,"modTitle":"冒聼聨炉 3. Modulua: Metodologia Aktiboak eta Pertsonalizazioa","obj":"NotebookLM metodologia aktiboetan integratzea (ABP, Flipped Classroom, Gamifikazioa) eta ikaskuntza pertsonalizatzen ikastea, edukiak maila eta behar ezberdinetara egokituz.","order":20,"title":"1. Estrategia - Proiektuetan Oinarritutako Ikaskuntza (ABP)","type":"Azalpena"},{"content":"Diseinatu [MAILA]ko ikasleentzako Proiektuetan Oinarritutako Ikaskuntza (ABP) proiektu bat kargatutako iturrietako edukietan oinarrituta. Proiektuak honakoak izan behar ditu:\n\n1. Proiektuaren IZENBURUA, sortzailea\n2. GALDERA ERAGILEA, jakin-mina pizten duena\n3. ERREALITATE-TESTUINGURUA: Mundu errealeko arazo edo egoera batekin lotura\n4. PROIEKTUAREN FASEAK (4-5 fase iraupena estimatuta): Fase bakoitzerako: deskribapena, jarduerak, beharrezko baliabideak eta entregatzekoa\n5. TALDE-LANERAKO ROLAK (4-5 rol erantzukizunekin)\n6. AMAIERAKO PRODUKTUA, espero dena\n7. 4 mailatako ERRUBRIKA (Bikaina, Ona, Nahikoa, Garatzen ari)\n8. Autoebaluazio eta koebaluaziorako IRIZPIDEAK\n\nProiektua [ZENBAKIA] saiotan burugarria izan behar da.","dur":"2 minutu","icon":"冒聼聨炉","id":"M3-03-eu","lang":"eu","mod":3,"modTitle":"冒聼聨炉 3. Modulua: Metodologia Aktiboak eta Pertsonalizazioa","obj":"NotebookLM metodologia aktiboetan integratzea (ABP, Flipped Classroom, Gamifikazioa) eta ikaskuntza pertsonalizatzen ikastea, edukiak maila eta behar ezberdinetara egokituz.","order":21,"title":"Kopiatu daitekeen Prompta: ABP Proiektu Osoa Diseinatzeko","type":"Kopiatu daitekeen Prompta"},{"content":"Ikasgela Alderantzikatuaren eredua NotebookLM-rekin ezin hobeto egokitzen da:\n\nKLASEA BAINO AURRETIK (etxean):\n- Sortu Audio Overview bat \"prestakuntza-podcast\" gisa.\n- Sortu aurre-irakurketa-gida galdera orientatzaileekin.\n- Diseinatu \"sarrera\" mini-galdetegia materiala ikusi dutela egiaztatzeko.\n\nKLASEAN ZEHAR (presentzialki):\n- Erabili denbora jarduera praktikoetarako, eztabaidetarako eta zalantzak argitzeko.\n- Notebookak sakontzeko ariketak sor ditzake denbora errealean.\n- Proiektatu notebookeko galderak talde-eztabaidarako.\n\nKLASEAREN ONDOREN (finkatzea):\n- Sortu material osagarri pertsonalizatuak.\n- Sortu jarraipen-ebaluazio formatiboak.\n- Diseinatu hedapen-jarduerak gehiago sakonddu nahi dutenentzat.","dur":"5 minutu","icon":"冒聼聨炉","id":"M3-04-eu","lang":"eu","mod":3,"modTitle":"冒聼聨炉 3. Modulua: Metodologia Aktiboak eta Pertsonalizazioa","obj":"NotebookLM metodologia aktiboetan integratzea (ABP, Flipped Classroom, Gamifikazioa) eta ikaskuntza pertsonalizatzen ikastea, edukiak maila eta behar ezberdinetara egokituz.","order":22,"title":"2. Estrategia - Flipped Classroom NotebookLM-rekin","type":"Azalpena"},{"content":"Diseinatu [MAILA]ko [GAIA]ri buruzko Ikasgela Alderantzikatuaren saio osoa. Egitura:\n\nKLASE AURREKOA (ikaslearen lan autonomoa, 20-30 min):\n- Funtsezko edukiaren laburpena (gehienez 1 orrialde)\n- Irakurketa/entzuketa gidatzeko 3 galdera orientatzaile\n- 5 galdera azkarreko mini-galdetegia (klaserako sarrera)\n\nKLASEAN (presentzialeko jarduerak, 50 min):\n- Hasierako jarduera: zalantzak detektatzeko dinamika (10 min)\n- Jarduera nagusia: ariketa praktikoa edo kolaboratiboa (25 min)\n- Amankomuneko jartzea eta zalantzak argitzea (15 min)\n\nKLASE ONDOKOA (finkatzea, 15 min):\n- Banakako aplikazio-ariketa 1\n- Hausnarketarako galdera metakognitibo 1\n\nSartu argibide argiak ikaslearentzat fase bakoitzean.","dur":"2 minutu","icon":"冒聼聨炉","id":"M3-05-eu","lang":"eu","mod":3,"modTitle":"冒聼聨炉 3. Modulua: Metodologia Aktiboak eta Pertsonalizazioa","obj":"NotebookLM metodologia aktiboetan integratzea (ABP, Flipped Classroom, Gamifikazioa) eta ikaskuntza pertsonalizatzen ikastea, edukiak maila eta behar ezberdinetara egokituz.","order":23,"title":"Kopiatu daitekeen Prompta: Flipped Classroom Saioa Diseinatzeko","type":"Kopiatu daitekeen Prompta"},{"content":"Diseinatu [MAILA]ko [GAIA]ri buruzko jarduera gamifikatu bat egitura honekin:\n\n- NARRAZIOA: Sortu ikaskuntza testuinguruan jartzen duen istorio edo eszena liluragarria (adib.: \"Misterio zientifiko bat konpondu behar duten ikertzaileak zarete...\").\n- MISIOAK: Iturrietako edukian oinarritutako 5 erronka progresibo (errazetik zailera).\n- PUNTU-SISTEMA: Nola lortzen diren puntuak, bonusak eta zigorrak.\n- PISTAK: Misio bakoitzerako, taldea blokeatu bada irakaslearen eman dezakeen pista bat.\n- LORPENAK/INSIGNIAK: Domeinua frogatuz desblokeatu daitezkeen 3 lorpen.\n- AZKEN NAGUSIA: Misio guztietan ikasitakoa bateratzea eskatzen duen erronka integratzailea.\n\nGalderak eta erronkak iturrietako edukian oinarritu behar dira modu zorrotzean.","dur":"2 minutu","icon":"冒聼聨炉","id":"M3-06-eu","lang":"eu","mod":3,"modTitle":"冒聼聨炉 3. Modulua: Metodologia Aktiboak eta Pertsonalizazioa","obj":"NotebookLM metodologia aktiboetan integratzea (ABP, Flipped Classroom, Gamifikazioa) eta ikaskuntza pertsonalizatzen ikastea, edukiak maila eta behar ezberdinetara egokituz.","order":24,"title":"Kopiatu daitekeen Prompta: Jarduera Gamifikatua Sortzeko","type":"Kopiatu daitekeen Prompta"},{"content":"Irakaskuntzan erronka nagusietako bat gelako aniztasunari erantzutea da. NotebookLM-k maila desberdinetara egokitutako materialak azkar sortzea ahalbidetzen du:\n\nINDAR MAILA:\n- Azalpen sinpleagoak eguneroko analogiekin.\n- Adibide gehiago eta urrats pausoz pausoko ariketa gidatuak.\n- Hiztegi sinplifikatua.\n\nMAILA ESTANDARRA:\n- Curriculum-helburuekin lerrokatutako materiala.\n- Teoria eta praktikaren arteko oreka.\n\nSAKONTZE MAILA:\n- Eduki osagarria eta erronka bereziak.\n- Diziplinarteko loturak.\n- Ikerketa autonomoa sustatzeko galdera irekiak.\n\nBEHAR BEREZIAK:\n- Zailtasunak dituzten ikasleentzako hizkuntza sinplifikatuko testuak.\n- Bertsio bisualagoak edo eskematikoak.\n- Jarraibide oso pausotuak dituzten materialak.","dur":"5 minutu","icon":"冒聼聨炉","id":"M3-07-eu","lang":"eu","mod":3,"modTitle":"冒聼聨炉 3. Modulua: Metodologia Aktiboak eta Pertsonalizazioa","obj":"NotebookLM metodologia aktiboekin integratzea (ABP, Flipped Classroom, Gamifikazioa) eta ikaskuntza pertsonalizatzen ikastea, edukiak maila eta behar desberdinetara egokituz.","order":25,"title":"Ikaskuntzaren Pertsonalizazioa NotebookLM-rekin","type":"Azalpena"},{"content":"Sortu [GAIA] buruzko material berberaren 3 bertsio, maila desberdinetara egokituak:\n\nA BERTSIOA - INDARRA:\n- Azalpen sinplifikatua eguneroko analogiekin\n- 3 ariketa gidatu pistarekin\n- Hitz gako nagusiak definizio sinpleekin\n- Luzapena: laburra, deskribatutako laguntza bisualarekin\n\nB BERTSIOA - ESTANDARRA:\n- Gaiaren azalpen osoa\n- Zailtasun ertaineko 5 ariketa\n- Hiztegia definizio teknikoekin\n- 1 hausnarketarako galdera\n\nC BERTSIOA - SAKONTZEA:\n- Azalpen sakona diziplinarteko loturekin\n- 3 ariketa zailgarri + 1 ikerketa-erronka\n- Eztabaidarako galdera irekia\n- Iradokitako baliabide osagarria\n\nBertsio guztiek ikaskuntza-helburu berberak estali behar dituzte.","dur":"2 minutu","icon":"冒聼聨炉","id":"M3-08-eu","lang":"eu","mod":3,"modTitle":"冒聼聨炉 3. Modulua: Metodologia Aktiboak eta Pertsonalizazioa","obj":"NotebookLM metodologia aktiboekin integratzea (ABP, Flipped Classroom, Gamifikazioa) eta ikaskuntza pertsonalizatzen ikastea, edukiak maila eta behar desberdinetara egokituz.","order":26,"title":"Kopiatzeko Prompta: Mailaka Bereizitako Materiala Sortzea","type":"Kopiatzeko Prompta"},{"content":"Aukeratu AUKERA BAT eta garatu zure notebook-arekin:\n\nA AUKERA - ABP PROIEKTUA: Erabili ABP prompta proiektu oso bat diseinatzeko. Egiaztatu zure curriculumarekin errealista eta lerrokatuta dagoela.\n\nB AUKERA - FLIPPED CLASSROOM SAIOA: Diseinatu saio alderantzikatu oso bat: sortu audio overview-a, aurretiazko gida eta saio presentzialerako jarduerak.\n\nC AUKERA - GAMIFIKAZIOA: Sortu gutxienez 5 misio dituen jarduera gamifikatua. Egiaztatu galderei iturrietan egiaztagarriak diren erantzunak dituztela.\n\nD AUKERA - PERTSONALIZAZIOA: Sortu bereizitako materiala (3 maila) zure irakasgaiko gai batentzat. Alderatu bertsioak eta doitu itzazu.\n\nENTREGABLEA: Sortutako material osoa + zure gelan nola ezarriko zenukeen adierazten duen 200 hitzeko hausnarketa.","dur":"30 minutu","icon":"冒聼聨炉","id":"M3-09-eu","lang":"eu","mod":3,"modTitle":"冒聼聨炉 3. Modulua: Metodologia Aktiboak eta Pertsonalizazioa","obj":"NotebookLM metodologia aktiboekin integratzea (ABP, Flipped Classroom, Gamifikazioa) eta ikaskuntza pertsonalizatzen ikastea, edukiak maila eta behar desberdinetara egokituz.","order":27,"title":"Jarduera Praktikoa: Zure Ikaskuntza-Esperientzia Diseinatzea","type":"Jarduera Praktikoa"},{"content":"- Ez saiatu metodologia guztiak aldi berean ezartzen. Aukeratu bat eta menderatu beste batera pasatu aurretik.\n- Partekatu Audio Overview-ak ikasleek eskaneatu ditzaketen QR kode baten bidez.\n- Gamifikaziorako, NotebookLM Genially, Kahoot edo Classcraft bezalako tresnekin konbina dezakezu.\n- Pertsonalizazioak ez du esan nahi 30 bertsio desberdin sortzea 芒聙聯 ondo diseinatutako 3 mailek behar gehienak estaltzen dituzte.\n- Eskatu zure ikasleei feedbacka sortutako materialen inguruan. Haien iritzia kalitate-neurririk onena da.\n- Dokumentatu zein prompt eta konbinazio funtzionatu zuten hobekien zure departamentuarekin partekatzeko.","dur":"3 minutu","icon":"冒聼聨炉","id":"M3-10-eu","lang":"eu","mod":3,"modTitle":"冒聼聨炉 3. Modulua: Metodologia Aktiboak eta Pertsonalizazioa","obj":"NotebookLM metodologia aktiboekin integratzea (ABP, Flipped Classroom, Gamifikazioa) eta ikaskuntza pertsonalizatzen ikastea, edukiak maila eta behar desberdinetara egokituz.","order":28,"title":"3. Moduluko Aholku Profesionalak","type":"Aholku Profesionala"},{"content":"IA hezkuntzan txertatzeak erantzukizun handia dakar. Irakasle gisa, teknologiaren erabileran ikasleentzako eredu gara. Hona hemen landu beharrekoak:\n\n1. EGIAZKOTASUNA: IAk informazio okerra edo alderatiua sor dezake, iturritan oinarrituta egon arren. Beti egiaztatu.\n2. AUTORETZA ETA PLAGIOA: Nor da IAk sortutako materialaren egilea? Nola bereizten dugu erabilera legitimitatik plagioa?\n3. PRIBATUTASUNA: Ez igo inoiz ikasleen datu pertsonalik edo informazio sentikorrik NotebookLM-ra.\n4. BERDINTASUNA: Ikasle guztiek ez dute teknologiarako sarbide berdina. Ziurtatu IAk arrakala digitala ez duela handitzen.\n5. GARDENTASUNA: Ikasleek jakin behar dute noiz erabiltzen den IA materialak sortzeko.\n6. MENDEKOTASUNA: IA osagarria da, ez irakaslearen juizio profesionalaren ordezkoa.","dur":"5 minutu","icon":"芒職聳茂赂聫","id":"M4-01-eu","lang":"eu","mod":4,"modTitle":"芒職聳茂赂聫 4. Modulua: Etika eta Pentsamendu Kritikoa","obj":"IA hezkuntzan erabiltzeko esparru etiko bat garatzea, IAren erantzunak egiaztatu eta zalantzan jartzen ikastea, eta pentsamendu kritikoa sustatzea bai norberagan bai ikasleengan.","order":29,"title":"Zergatik da etika ezinbestekoa IA gelan erabiltzean?","type":"Azalpena"},{"content":"NotebookLM zure iturrietan oinarritzen den arren (\"haluzinazio\"-ak murrizten dituenak), BETI egiaztatu behar duzu:\n\nEGIAZTAPEN ZERRENDA:\n- Zenbakitutako aipuak benetan jatorrizko iturrian dioena adierazten dute?\n- Ba al daude inongo iturrik babesten ez duen baiezpenik?\n- Konplexutasun-maila egokia al da zure ikasleentzat?\n- Ba al daude akats faktualik edo kontzeptualik?\n- Informazioa eguneratuta al dago zure ezagutza adituaren arabera?\n- Tonua eta hizkuntza egokiak al dira hezkuntza-testuingururako?\n- Ariketak eta galderak egiaztagarriak diren erantzun zuzenak al dituzte?\n\nURREZKO ARAUA: IAren erantzun bat pertsonalki egiaztatu ezin baduzu, ez erabili klasean. Irakasle gisa duzun ezagutza aditu da azken eta ordezkaezina den iragazkia.","dur":"5 minutu","icon":"芒職聳茂赂聫","id":"M4-02-eu","lang":"eu","mod":4,"modTitle":"芒職聳茂赂聫 4. Modulua: Etika eta Pentsamendu Kritikoa","obj":"IA hezkuntzan erabiltzeko esparru etiko bat garatzea, IAren erantzunak egiaztatu eta zalantzan jartzen ikastea, eta pentsamendu kritikoa sustatzea bai norberagan bai ikasleengan.","order":30,"title":"IAren Erantzunen Egiaztapen Kritikoa","type":"Azalpena"},{"content":"Berrikusi kritikoki zure azken erantzuna eta adierazi:\n1. Zein baieztapen daude zuzenean iturrietan oinarrituta? Adierazi iturri zehatza.\n2. Ba al dago inferitu edo extrapolatu duzun baiezpanik iturrietan oinarri zuzenik gabe? Identifikatu.\n3. Ba al daude sortutako materialean alderdi-joera edo ikuspegi mugatuak?\n4. Zein informazio garrantzitsu gaiaren inguruan EZ dago eskuragarri dauden iturrietan bilduta?\n5. Zein konfiantza-maila (altua/ertaina/baxua) esleituko zenioke zure erantzuneko atal bakoitzari?\n\nIzan ezazu zintzoa eta zorrotza autoebaluaketa honetan.","dur":"2 minutu","icon":"芒職聳茂赂聫","id":
