<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NotebookLM per a Docents: Potenciant l'Aula amb IA</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>챨혺혫혫</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#4F46E5;--pl:#818CF8;--pd:#3730A3;--bg:#F8FAFC;--c:#FFF;--t:#1E293B;--tl:#64748B;--b:#E2E8F0;--ok:#10B981;--w:#F59E0B;--a:#EC4899;--sh:0 1px 3px rgba(0,0,0,.1);--shl:0 10px 15px -3px rgba(0,0,0,.1)}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--t);line-height:1.6}
.hd{background:linear-gradient(135deg,var(--pd),var(--p),var(--pl));color:#fff;padding:2rem 1rem;text-align:center;position:relative;z-index:100;box-shadow:var(--shl)}
.hd h1{font-size:clamp(1.2rem,3vw,1.8rem);font-weight:800;margin-bottom:.25rem;letter-spacing:-.02em}
.hd p{font-size:.85rem;opacity:.85;max-width:600px;margin:0 auto}
.lb{display:flex;justify-content:center;gap:.4rem;margin-top:1rem;flex-wrap:wrap}
.lb button{padding:.35rem .9rem;border-radius:2rem;border:2px solid rgba(255,255,255,.35);background:transparent;color:#fff;cursor:pointer;font-size:.78rem;font-weight:600;transition:all .25s}
.lb button:hover,.lb button.on{background:#fff;color:var(--p);border-color:#fff;transform:scale(1.05)}
.ct{background:var(--c);padding:.8rem;border-bottom:1px solid var(--b);position:sticky;top:0;z-index:90;box-shadow:var(--sh)}
.ct .row{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center;margin-bottom:.4rem}
.ct .row:last-child{margin-bottom:0}
.fb{padding:.3rem .75rem;border-radius:1.5rem;border:1px solid var(--b);background:var(--c);color:var(--tl);cursor:pointer;font-size:.72rem;transition:all .2s;white-space:nowrap}
.fb:hover{border-color:var(--p);color:var(--p)}
.fb.on{background:var(--p);color:#fff;border-color:var(--p)}
.mx{max-width:920px;margin:0 auto;padding:1rem}
.st{display:flex;gap:.8rem;justify-content:center;padding:.6rem;flex-wrap:wrap}
.st>div{background:var(--c);padding:.4rem .9rem;border-radius:.5rem;font-size:.72rem;color:var(--tl);box-shadow:var(--sh)}
.st strong{color:var(--p);font-size:.95rem;display:block}
.mg{margin-bottom:1.5rem}
.mh{background:var(--c);border-radius:.75rem;padding:1.1rem;margin-bottom:.6rem;box-shadow:var(--sh);border-left:4px solid var(--p)}
.mh h2{font-size:1.05rem;color:var(--t);margin-bottom:.2rem}
.mh .mt{font-size:.78rem;color:var(--tl)}
.pb{height:3px;background:var(--b);border-radius:2px;margin-top:.4rem;overflow:hidden}
.pf{height:100%;background:linear-gradient(90deg,var(--p),var(--pl));border-radius:2px;transition:width .5s}
.cd{background:var(--c);border-radius:.65rem;padding:.9rem 1.1rem;margin-bottom:.5rem;box-shadow:var(--sh);border-left:4px solid transparent;transition:all .2s;cursor:default}
.cd:hover{box-shadow:var(--shl);transform:translateY(-1px)}
.cd.ex{border-left-color:#3B82F6}.cd.ac{border-left-color:#10B981}.cd.pr{border-left-color:#F59E0B}.cd.co{border-left-color:#8B5CF6}.cd.tf{border-left-color:#EC4899}
.ch{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;margin-bottom:.4rem}
.ct2{font-size:.9rem;font-weight:600;flex:1}
.bg{padding:.15rem .55rem;border-radius:1rem;font-size:.62rem;font-weight:700;white-space:nowrap;text-transform:uppercase;letter-spacing:.03em}
.bg.ex{background:#DBEAFE;color:#1D4ED8}.bg.ac{background:#D1FAE5;color:#065F46}.bg.pr{background:#FEF3C7;color:#92400E}.bg.co{background:#EDE9FE;color:#5B21B6}.bg.tf{background:#FCE7F3;color:#9D174D}
.cc{font-size:.82rem;color:var(--t);white-space:pre-wrap;line-height:1.65;word-break:break-word}
.cm{display:flex;gap:.6rem;margin-top:.35rem;font-size:.68rem;color:var(--tl)}
.cp{display:inline-block;background:none;border:1px solid var(--b);border-radius:.3rem;padding:.15rem .4rem;font-size:.62rem;cursor:pointer;color:var(--tl);transition:all .2s;margin-left:.4rem;vertical-align:middle}
.cp:hover{border-color:var(--p);color:var(--p)}
.cp.ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.nr{text-align:center;padding:3rem;color:var(--tl);font-size:.9rem}
.ld{text-align:center;padding:4rem;color:var(--tl)}
.sp{width:36px;height:36px;border:3px solid var(--b);border-top-color:var(--p);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}
.ft{text-align:center;padding:1.5rem;color:var(--tl);font-size:.7rem;border-top:1px solid var(--b);margin-top:2rem}
.search{padding:.4rem .8rem;border:1px solid var(--b);border-radius:1.5rem;font-size:.78rem;width:100%;max-width:300px;outline:none;transition:border .2s}
.search:focus{border-color:var(--p)}
@media(max-width:640px){.hd h1{font-size:1.1rem}.mx{padding:.5rem}.cd{padding:.7rem .85rem}}
</style>
</head>
<body>
<div class="hd">
<h1>챨혺혫혫 NotebookLM per a Docents</h1>
<p>Potenciant l'Aula amb Intel횂쨌lig횄짢ncia Artificial &mdash; Plataforma PrisMa</p>
<div class="lb" id="lb"></div>
</div>
<div class="ct" id="ct">
<div class="row" id="mf"></div>
<div class="row" id="tf"></div>
<div class="row"><input class="search" id="sq" type="text" placeholder="챨혺혬혥 Cercar contingut..." oninput="R()"></div>
</div>
<div class="st" id="st"></div>
<div class="mx" id="app"><div class="ld"><div class="sp"></div>Carregant 287 registres en 7 idiomes...</div></div>
<div class="ft">
<p><strong>Minicurs NotebookLM per a Docents</strong> &mdash; 287 registres &bull; 7 idiomes &bull; 5 m&ograve;duls</p>
<p style="margin-top:.3rem">Plataforma de formaci&oacute; PrisMa &copy; 2025</p>
</div>
<script>
const SID='1llyx9w1BdxngyeQB77YLrH2EJA_IqaVx_Vd7OhJbnUs';
const L={ca:'Catal횄혻',es:'Castellano',eu:'Euskara',gl:'Galego',fr:'Fran횄짠ais',en:'English',de:'Deutsch'};
const TK={'Explicaci횄쨀':'ex','Activitat Pr횄혻ctica':'ac','Prompt Copiable':'pr','Consell Pro':'co','Tasca Final':'tf',
'Explicaci횄쨀n':'ex','Actividad Pr횄징ctica':'ac','Consejo Pro':'co','Tarea Final':'tf',
'Azalpena':'ex','Jarduera Praktikoa':'ac','Prompt Kopiagarria':'pr','Aholku Profesionala':'co','Azken Ataza':'tf',
'Actividade Pr횄징ctica':'ac','Consello Pro':'co','Tarefa Final':'tf',
'Explication':'ex','Activit횄짤 Pratique':'ac','Prompt 횄혻 Copier':'pr','Conseil Pro':'co','T횄짖che Finale':'tf',
'Explanation':'ex','Practical Activity':'ac','Copyable Prompt':'pr','Pro Tip':'co','Final Task':'tf',
'Erkl횄짚rung':'ex','Praktische Aktivit횄짚t':'ac','Kopierbarer Prompt':'pr','Profi-Tipp':'co','Abschlussaufgabe':'tf'};
const TL={ca:{ex:'Explicaci횄쨀',ac:'Activitat Pr횄혻ctica',pr:'Prompt Copiable',co:'Consell Pro',tf:'Tasca Final'},
es:{ex:'Explicaci횄쨀n',ac:'Actividad Pr횄징ctica',pr:'Prompt Copiable',co:'Consejo Pro',tf:'Tarea Final'},
eu:{ex:'Azalpena',ac:'Jarduera Praktikoa',pr:'Prompt Kopiagarria',co:'Aholku Profesionala',tf:'Azken Ataza'},
gl:{ex:'Explicaci횄쨀n',ac:'Actividade Pr횄징ctica',pr:'Prompt Copiable',co:'Consello Pro',tf:'Tarefa Final'},
fr:{ex:'Explication',ac:'Activit횄짤 Pratique',pr:'Prompt 횄혻 Copier',co:'Conseil Pro',tf:'T횄짖che Finale'},
en:{ex:'Explanation',ac:'Practical Activity',pr:'Copyable Prompt',co:'Pro Tip',tf:'Final Task'},
de:{ex:'Erkl횄짚rung',ac:'Praktische Aktivit횄짚t',pr:'Kopierbarer Prompt',co:'Profi-Tipp',tf:'Abschlussaufgabe'}};
const UI={ca:{all:'Tots',allM:'Tots els m횄짼duls',allT:'Tots els tipus',search:'Cercar contingut...',of:'de',contents:'continguts',modules:'m횄짼duls',total:'registres totals',noResults:'Cap resultat amb els filtres seleccionats.',loading:'Carregant'},
es:{all:'Todos',allM:'Todos los m횄쨀dulos',allT:'Todos los tipos',search:'Buscar contenido...',of:'de',contents:'contenidos',modules:'m횄쨀dulos',total:'registros totales',noResults:'Sin resultados con los filtros seleccionados.',loading:'Cargando'},
eu:{all:'Denak',allM:'Modulu guztiak',allT:'Mota guztiak',search:'Edukia bilatu...',of:'/',contents:'edukiak',modules:'moduluak',total:'erregistro guztira',noResults:'Ez dago emaitzarik aukeratutako iragazkiekin.',loading:'Kargatzen'},
gl:{all:'Todos',allM:'Todos os m횄쨀dulos',allT:'Todos os tipos',search:'Buscar contido...',of:'de',contents:'contidos',modules:'m횄쨀dulos',total:'rexistros totais',noResults:'Sen resultados cos filtros seleccionados.',loading:'Cargando'},
fr:{all:'Tous',allM:'Tous les modules',allT:'Tous les types',search:'Rechercher du contenu...',of:'de',contents:'contenus',modules:'modules',total:'enregistrements au total',noResults:'Aucun r횄짤sultat avec les filtres s횄짤lectionn횄짤s.',loading:'Chargement'},
en:{all:'All',allM:'All modules',allT:'All types',search:'Search content...',of:'of',contents:'contents',modules:'modules',total:'total records',noResults:'No results with the selected filters.',loading:'Loading'},
de:{all:'Alle',allM:'Alle Module',allT:'Alle Typen',search:'Inhalt suchen...',of:'von',contents:'Inhalte',modules:'Module',total:'Datens횄짚tze insgesamt',noResults:'Keine Ergebnisse mit den ausgew횄짚hlten Filtern.',loading:'Wird geladen'}};
let D=[],cl='ca',am='all',at='all';
function parseCSV(t){const r=[];let i=0;while(i<t.length&&t[i]!=='\n')i++;i++;
while(i<t.length){if(t.substring(i).trim()==='')break;const f=[];let fc=0;
while(fc<11&&i<t.length){if(t[i]==='"'){i++;let v='';while(i<t.length){if(t[i]==='"'){if(i+1<t.length&&t[i+1]==='"'){v+='"';i+=2}else{i++;break}}else{v+=t[i];i++}}f.push(v);if(i<t.length&&t[i]===',')i++;else if(i<t.length&&t[i]==='\r'){i++;if(i<t.length&&t[i]==='\n')i++}else if(i<t.length&&t[i]==='\n')i++}else{let v='';while(i<t.length&&t[i]!==','&&t[i]!=='\r'&&t[i]!=='\n'){v+=t[i];i++}f.push(v);if(i<t.length&&t[i]===',')i++;else if(i<t.length&&t[i]==='\r'){i++;if(i<t.length&&t[i]==='\n')i++}else if(i<t.length&&t[i]==='\n')i++}fc++}
if(f.length>=10&&/^(M|TF)/.test(f[0]))r.push({id:f[0],lang:f[1],mod:+f[2],icon:f[3],modTitle:f[4],obj:f[5],dur:f[6],type:f[7],title:f[8],content:f[9],order:+f[10]||0})}return r}
async function loadData(){
try{const u=`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:csv`;const r=await fetch(u);if(!r.ok)throw 0;D=parseCSV(await r.text())}catch(e){
try{const u=`https://docs.google.com/spreadsheets/d/${SID}/export?format=csv`;const r=await fetch(u);if(!r.ok)throw 0;D=parseCSV(await r.text())}catch(e2){
try{const r=await fetch('data.json');if(r.ok)D=await r.json()}catch(e3){}}}
if(D.length)init();else document.getElementById('app').innerHTML='<div class="nr">Error carregant dades. Recarregueu la p횄혻gina.</div>'}
function init(){rlb();rct();rst();R()}
function rlb(){const b=document.getElementById('lb');b.innerHTML=Object.entries(L).map(([c,n])=>`<button class="${c===cl?'on':''}" onclick="sl('${c}')">${n}</button>`).join('')}
function sl(l){cl=l;am='all';at='all';document.getElementById('sq').value='';document.getElementById('sq').placeholder='챨혺혬혥 '+(UI[cl]||UI.ca).search;rlb();rct();rst();R()}
function rct(){const recs=D.filter(r=>r.lang===cl);const mods=[...new Map(recs.map(r=>[r.mod,r])).values()].sort((a,b)=>a.mod-b.mod);const types=[...new Set(recs.map(r=>tk(r.type)))];const tl=TL[cl]||TL.ca;const ui=UI[cl]||UI.ca;
let mh='<button class="fb '+(am==='all'?'on':'')+'" onclick="sm(\'all\')">'+ui.allM+'</button>';
mods.forEach(m=>{mh+=`<button class="fb ${am==m.mod?'on':''}" onclick="sm(${m.mod})">${m.icon} M${m.mod}</button>`});
let th='<button class="fb '+(at==='all'?'on':'')+'" onclick="st2(\'all\')">'+ui.allT+'</button>';
types.forEach(t=>{th+=`<button class="fb ${t} ${at===t?'on':''}" onclick="st2('${t}')">${tl[t]||t}</button>`});
document.getElementById('mf').innerHTML=mh;document.getElementById('tf').innerHTML=th}
function tk(t){return TK[t]||'ex'}
function sm(m){am=m;rct();rst();R()}
function st2(t){at=t;rct();rst();R()}
function gf(){let r=D.filter(d=>d.lang===cl);if(am!=='all')r=r.filter(d=>d.mod==am);if(at!=='all')r=r.filter(d=>tk(d.type)===at);const q=(document.getElementById('sq').value||'').toLowerCase();if(q)r=r.filter(d=>(d.title+' '+d.content).toLowerCase().includes(q));return r.sort((a,b)=>a.mod-b.mod||a.order-b.order)}
function rst(){const ui=UI[cl]||UI.ca;const tot=D.filter(r=>r.lang===cl).length;const f=gf();const ms=new Set(f.map(r=>r.mod)).size;
document.getElementById('st').innerHTML=`<div><strong>${f.length}</strong>${ui.of} ${tot} ${ui.contents}</div><div><strong>${ms}</strong> ${ui.modules}</div><div><strong>287</strong> ${ui.total}</div>`}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function R(){const recs=gf();const ui=UI[cl]||UI.ca;if(!recs.length){document.getElementById('app').innerHTML='<div class="nr">'+ui.noResults+'</div>';rst();return}
const g={};recs.forEach(r=>{if(!g[r.mod])g[r.mod]={icon:r.icon,title:r.modTitle,obj:r.obj,items:[]};g[r.mod].items.push(r)});
let h='';Object.keys(g).sort((a,b)=>a-b).forEach(mod=>{const gr=g[mod];const tot=D.filter(r=>r.lang===cl&&r.mod==mod).length;const sh=gr.items.length;
h+=`<div class="mg"><div class="mh"><h2>${esc(gr.title)}</h2><div class="mt">챨혺혦짱 ${esc(gr.obj)}</div><div class="pb"><div class="pf" style="width:${Math.round(sh/tot*100)}%"></div></div></div>`;
gr.items.forEach(r=>{const t=tk(r.type);const tl=TL[cl]||TL.ca;const ip=t==='pr';
h+=`<div class="cd ${t}"><div class="ch"><div class="ct2">${esc(r.title)}</div><span class="bg ${t}">${tl[t]||r.type}</span></div><div class="cc">${esc(r.content)}${ip?'<button class="cp" onclick="cp(this)">챨혺혫혢 Copy</button>':''}</div><div class="cm"><span>창혧짹 ${r.dur}</span><span>#${r.order}</span></div></div>`});
h+='</div>'});document.getElementById('app').innerHTML=h;rst()}
function cp(btn){const txt=btn.parentElement.textContent.replace('챨혺혫혢 Copy','').replace('창혵혚 Copied!','').trim();navigator.clipboard.writeText(txt).then(()=>{btn.textContent='창혵혚 Copied!';btn.classList.add('ok');setTimeout(()=>{btn.textContent='챨혺혫혢 Copy';btn.classList.remove('ok')},2000)})}
loadData();
</script>
</body>
</html>
