"M4-03-eu","lang":"eu","mod":4,"modTitle":"芒職聳茂赂聫 4. Modulua: Etika eta Pentsamendu Kritikoa","obj":"IA hezkuntzan erabiltzeko esparru etiko bat garatzea, IAren erantzunak egiaztatu eta zalantzan jartzen ikastea, eta pentsamendu kritikoa sustatzea bai norberagan bai ikasleengan.","order":31,"title":"Kopiatzeko Prompta: IAren Erantzunak Auditatzea","type":"Kopiatzeko Prompta"},{"content":"Ez da nahikoa zuk IA kritikoki erabiltzea 芒聙聯 zure ikasleei ere hori egiten irakatsi behar diezu. VERIFY esparru ikasleentzat:\n\nV - VERIFICATU: Informazioa bat dator beste iturri fidagarriekin?\nE - EBALUATU: Nork sortu zuen jatorrizko edukia? Iturri baimendua al da?\nR - ARRAZONATU: Erantzunak zentzua al du? Argudioak ondo eraikita al daude?\nI - IDENTIFIKATU: Ba al daude alderdi-joerak, omisioak edo gehiegizko sinplifikazioak?\nF - FROGATU: Aurkitu al dezaket hau babesten duen froga independenterik?\nY - ETA GALDETU: Zer gehiago jakin behar dut IAk esan ez didanik?\n\nGELARENTZAKO JARDUERA: Eman ikasleei IAk sortutako erantzun bat (nahita egindako erroreekin) eta eskatu iezaiezue VERIFY esparrua erabiliz ebaluatzeko.","dur":"5 minutu","icon":"芒職聳茂赂聫","id":"M4-04-eu","lang":"eu","mod":4,"modTitle":"芒職聳茂赂聫 4. Modulua: Etika eta Pentsamendu Kritikoa","obj":"IA hezkuntzan erabiltzeko esparru etiko bat garatzea, IAren erantzunak egiaztatu eta zalantzan jartzen ikastea, eta pentsamendu kritikoa sustatzea bai norberagan bai ikasleengan.","order":32,"title":"Ikasleei IArekiko Jarrera Kritikoa Irakasten","type":"Azalpena"},{"content":"Ikagelako IA-politika bat ezartzeko printzipioen proposamena:\n\n1. GARDENTASUNA: Beti jakinarazi materialak sortzeko IA erabili denean.\n2. GIZA GAINBEGIRATZEA: IAk sortutako eduki guztia irakasleak berrikusi behar du.\n3. PRIBATUTASUNA LEHENIK: Ez kargatu inoiz ikasleen datu pertsonalik IA-tresnetan.\n4. TRESNA GISA ERABILTZEA: IAk laguntzen du, ez du ikaskuntza-prozesua ordezkatzen.\n5. SARBIDE-BERDINTASUNA: Bermatu ikasle guztiek sarbide berdina dutela.\n6. PENTSAMENDU KRITIKOA: Aktiboki irakatsi IAren erantzunak zalantzan jartzen.\n7. SORMEN-BABESLEA: Ikaslearen jatorrizko lan sortzailea IAk sortutakoaren gainetik baloratu behar da.\n8. ETENGABEKO PRESTAKUNTZA: Irakasleriak etengabe eguneratu behar du IAren erabilera etikoari dagokionez.\n\nIRADOKIZUNA: Egokitu printzipio hauek eta aurkeztu zure klaustroan edo departamentuan erakunde-politika baterako abiapuntu gisa.","dur":"5 minutu","icon":"芒職聳茂赂聫","id":"M4-05-eu","lang":"eu","mod":4,"modTitle":"芒職聳茂赂聫 4. Modulua: Etika eta Pentsamendu Kritikoa","obj":"IA hezkuntzarako erabiltzeko esparru etiko bat garatzea, IAren erantzunak egiaztatzea eta zalantzan jartzen ikastea, eta pentsamendu kritikoa sustatzea bai irakasleongan bai ikasleengan.","order":33,"title":"IAren Erabilerarako Esparru Etikoa Zure Hezkuntza-Zentroan","type":"Azalpena"},{"content":"Iturriak oinarri hartuta, sort脩聝 hezkuntzako etika eta IAri buruzko ikasgela-debate baterako materiala. Honakoa barne hartu:\n\n1. KASU PRAKTIKOA: Deskribatu ikasle batek IA modu zalantzan jartzekoan erabiltzen duen agertoki errealista bat (adib.: IAk sortutako lana norberarena balitz bezala aurkeztea).\n2. DEBATERAKO GALDERAK (5-7 galdera): Benetako dilema-galderak, ez erantzun nabarmenekin. Ikuspegi anitz kontuan hartzera gonbidatzen dutenak.\n3. IKASLEEK IA ERABILTZEKO ARGUDIO ALDEKO ETA KONTRAKO argudioak (gutxienez 3 bakoitzetik).\n4. ONDORIO ORIENTATZAILEAK: Ikasleek eurek sortutako \"erabilera arduratsuko kodea\" gidatu dezaketen printzipioak.\n\nMaterialak hausnarketa sustatu behar du, ez jarrera bakarra inposatu.","dur":"2 minutu","icon":"芒職聳茂赂聫","id":"M4-06-eu","lang":"eu","mod":4,"modTitle":"芒職聳茂赂聫 4. Modulua: Etika eta Pentsamendu Kritikoa","obj":"IA hezkuntzarako erabiltzeko esparru etiko bat garatzea, IAren erantzunak egiaztatzea eta zalantzan jartzen ikastea, eta pentsamendu kritikoa sustatzea bai irakasleongan bai ikasleengan.","order":34,"title":"Prompt Kopiatzekoa: Ikasgela-Debate Etikoa Sortzea IAri buruz","type":"Prompt Kopiatzekoa"},{"content":"Egin zure NotebookLM-ekin egindako lanaren ikuskaritza osoa:\n\n1. EDUKIAREN EGIAZTAPENA: Hartu sortu zenuen azken materiala eta aplikatu egiaztapen-kontrol-zerrenda. Identifikatu giza berrikuspen bat behar duten gutxienez 2 puntu.\n2. ALBORAPENAREN PROBA: Eskatu notebookari gai bat bi ikuspegitik azaltzeko. Biak era orekatuan aurkezten ditu?\n3. PRIBATUTASUN-TESTA: Berrikusi kargatutako iturri guztiak: ikasleen datu pertsonalik ba al dago? Badago, kendu berehala.\n4. VERIFY ARIKETA: Sortu erantzun bat ondo ezagutzen duzun gai bati buruz. Aplikatu VERIFY esparrua ikasle bat bazina bezala. Dokumentatu zer aurkitu duzun.\n\nEMAITZA: Txosten labur bat (1 orrialde) zure ikuskaritzaren aurkikuntzak eta IAren erabilera etikoa hobetzeko 3 ekintzako plana jasota.","dur":"20 minutu","icon":"芒職聳茂赂聫","id":"M4-07-eu","lang":"eu","mod":4,"modTitle":"芒職聳茂赂聫 4. Modulua: Etika eta Pentsamendu Kritikoa","obj":"IA hezkuntzarako erabiltzeko esparru etiko bat garatzea, IAren erantzunak egiaztatzea eta zalantzan jartzen ikastea, eta pentsamendu kritikoa sustatzea bai irakasleongan bai ikasleengan.","order":35,"title":"Jarduera Praktikoa: Zure Notebookaren Ikuskaritza Etikoa","type":"Jarduera Praktikoa"},{"content":"- Egiaztapena ez da aukerakoa: IArekin lan egiteko fluxuaren zati nagusia da.\n- Sortu ikasgela-kultura bat non IAren zalantzan jartzea natural eta baloratua den.\n- Dokumentatu NotebookLM-en erantzunetan aurkitzen dituzun akatsak. Adibide didaktiko bikainak dira.\n- Eguneratu zure IA-politika urtean behin gutxienez: teknologia azkar eboluzionatzen da.\n- Inplikatu familiak eta administrazioa ikasgela-IAri buruzko elkarrizketetan.\n- Gogoan izan: ikasgela hoberena oraindik zure irakasle-burua da.","dur":"3 minutu","icon":"芒職聳茂赂聫","id":"M4-08-eu","lang":"eu","mod":4,"modTitle":"芒職聳茂赂聫 4. Modulua: Etika eta Pentsamendu Kritikoa","obj":"IA hezkuntzarako erabiltzeko esparru etiko bat garatzea, IAren erantzunak egiaztatzea eta zalantz lang":"eu","mod":5,"modTitle":"冒聼聫聠 Azken Ataza: Zure Irakasle-Notebook Osoa","obj":"4 moduluetan ikasitako guztia integratzea irakasle-notebook oso eta funtzional bat sortuz, ikasgela-erabilpenerako prest, kurtsoaren konpetentzia guztietako menperatze maila erakutsiz.","order":38,"title":"Proiektuaren Baldintzak","type":"Azken Ataza"},{"content":"BIKAIN (9-10):\n- Atal guztiak osoak eta kalitate handikoak.\n- Ikasgela-erabilpenerako zuzenean baliagarriak diren materialak.\n- Hausnarketa etiko sakona eta pertsonala.\n- Metodologia aktiboaren diseinuko sormena.\n- Egiaztapen eta pentsamendu kritikoaren ebidentzia argia.\n\nON (7-8):\n- Atal guztiak presente.\n- Doikuntza txikiak behar dituzten material funtzionalak.\n- Hausnarketa etiko egokia.\n- Ondo diseinatutako metodologia aktiboa.\n\nNAHIKOA (5-6):\n- Atal gehienak presente.\n- Material oinarrizkoak baina funtzionalak.\n- Hausnarketa etiko azalekoa.\n- Metodologia aktibo sinplea.\n\nAURRERAKUNTZAN (1-4):\n- Atal osatu gabeak edo falta direnak.\n- Berrikusketa garrantzitsua behar duten materialak.\n- Hausnarketa etikorik edo egiaztapenik gabe.\n\nENTREGA-DATA: Kurtsoaren egutegiaren arabera.\nFORMATUA: NotebookLM notebookaren esteka + sortutako materialak eta hausnarketa jasotzen dituen dokumentua.","dur":"5 minutu","icon":"冒聼聫聠","id":"TF-03-eu","lang":"eu","mod":5,"modTitle":"冒聼聫聠 Azken Ataza: Zure Irakasle-Notebook Osoa","obj":"4 moduluetan ikasitako guztia integratzea irakasle-notebook oso eta funtzional bat sortuz, ikasgela-erabilpenerako prest, kurtsoaren konpetentzia guztietako menperatze maila erakutsiz.","order":39,"title":"Ebaluazio-Errubrika","type":"Azken Ataza"},{"content":"Jardun ezazu hezkuntza-ebaluatzaile aditu gisa. Berrikusi notebook honetako eduki guztia eta ebaluatu:\n\n1. ESTALDURA: Materialek unitateko ikaskuntza-helburuak behar bezala estaltzen dituzte?\n2. KOHERENTZIA: Ba al dago lerrokatzea ikasketa-gidaren, ebaluazioaren eta glosarioaren artean?\n3. MAILA: Hizkuntza eta zailtasuna adier educativos (extrae e analiza o contido).\n\nCONSELLOS PARA SELECCIONAR FONTES:\n- Prioriza documentos oficiais do curr脙颅culo.\n- Incl脙潞e a t脙潞a programaci脙鲁n did脙隆ctica.\n- Engade materiais que xa uses na clase.\n- Sube exemplos de exames ou actividades anteriores.\n- Canto m脙隆is espec脙颅fico e de calidade sexa o material, mellores ser脙隆n as respostas.","dur":"5 minutos","icon":"冒聼搂聽","id":"M1-03-gl","lang":"gl","mod":1,"modTitle":"冒聼搂聽 M脙鲁dulo 1: Constru脙颅ndo o \"Cerebro\" da t脙潞a Materia","obj":"Aprender a crear e configurar un notebook especializado en NotebookLM, aliment脙隆ndoo con fontes de calidade para convertelo nun asistente experto na t脙潞a materia.","order":3,"title":"Paso 2 - Alimentar o Notebook con Fontes de Calidade","type":"Explicaci脙鲁n"},{"content":"Unha vez subidas as fontes, NotebookLM xera automaticamente unha \"Gu脙颅a do Notebook\" con:\n\n- Resumo xeral: Visi脙鲁n panor脙隆mica de todo o contido.\n- Temas clave: Os conceptos principais detectados.\n- Preguntas suxeridas: Preguntas que podes facer directamente.\n\nEsta gu脙颅a 脙漏 o teu punto de partida para interactuar co notebook. Rev脙颅saa para verificar que a IA comprendeu correctamente o teu material.","dur":"5 minutos","icon":"冒聼搂聽","id":"M1-04-gl","lang":"gl","mod":1,"modTitle":"冒聼搂聽 M脙鲁dulo 1: Constru脙颅ndo o \"Cerebro\" da t脙潞a Materia","obj":"Aprender a crear e configurar un notebook especializado en NotebookLM, aliment脙隆ndoo con fontes de calidade para convertelo nun asistente experto na t脙潞a materia.","order":4,"title":"Paso 3 - Explorar a Gu脙颅a do Notebook","type":"Explicaci脙鲁n"},{"content":"INSTRUCI脙聯NS:\n1. Crea un novo notebook para unha das t脙潞as materias.\n2. Sube polo menos 3-5 fontes variadas (PDF do libro, a t脙潞a programaci脙鲁n, un artigo web).\n3. Revisa a Gu脙颅a do Notebook xerada automaticamente.\n4. Fai 3 preguntas de proba ao notebook para verificar a calidade das respostas.\n\nVERIFICACI脙聯N: As respostas deben inclu脙颅r citas numeradas nas que podes facer clic para ver a fonte orixina tutional account).\n2. Click on \"New Notebook\" (+ New Notebook).\n3. Name it descriptively, for example: \"Biology Year 9 芒聙聯 Cell and Genetics\" or \"History Year 12 芒聙聯 The 20th Century\".\n\nIMPORTANT: Each notebook is an isolated workspace. Create one per subject, teaching unit, or project. This keeps the AI's responses focused and precise.","dur":"5 minutes","icon":"冒聼搂聽","id":"M1-02-en","lang":"en","mod":1,"modTitle":"冒聼搂聽 Module 1: Building the \"Brain\" of Your Subject","obj":"Learn how to create and configure a specialised notebook in NotebookLM, feeding it with high-quality sources to transform it into an expert assistant for your subject area.","order":2,"title":"Step 1 芒聙聯 Creating Your First Notebook","type":"Explanation"},{"content":"NotebookLM accepts multiple source types (up to 50 per notebook):\n\n- Google Docs: Notes, lesson plans, rubrics.\n- PDFs: Textbooks, academic articles, official regulations.\n- URLs/Web pages: Reference articles, online resources.\n- Copied text: Relevant excerpts you wish to include.\n- Google Slides: Classroom presentations.\n- YouTube: Educational videos (the tool extracts and analyses the content).\n\nTIPS FOR SELECTING SOURCES:\n- Prioritise official curriculum documents.\n- Include your teaching programme.\n- Add materials you already use in class.\n- Upload examples of past exams or activities.\n- The more specific and high-quality the material, the better the responses will be.","dur":"5 minutes","icon":"冒聼搂聽","id":"M1-03-en","lang":"en","mod":1,"modTitle":"冒聼搂聽 Module 1: Building the \"Brain\" of Your Subject","obj":"Learn how to create and configure a specialised notebook in NotebookLM, feeding it with high-quality sources to transform it into an expert assistant for your subject area.","order":3,"title":"Step 2 芒聙聯 Feeding the Notebook with High-Quality Sources","type":"Explanation"},{"content":"Once the sources have been uploaded, NotebookLM automatically generates a \"Notebook Guide\" containing:\n\n- General summary: A panoramic overview of all the content.\n- Key topics: The main concepts identified.\n- Suggested questions: Questions you can ask directly.\n\nThis guide is your starting point for interacting with the notebook. Review it carefully to verify that the AI has correctly understood your material.","dur":"5 minutes","icon":"冒聼搂聽","id":"M1-04-en","lang":"en","mod":1,"modTitle":"冒聼搂聽 Module 1: Building the \"Brain\" of Your Subject","obj":"Learn how to create and configure a specialised notebook in NotebookLM, feeding it with high-quality sources to transform it into an expert assistant for your subject area.","order":4,"title":"Step 3 芒聙聯 Exploring the Notebook Guide","type":"Explanation"},{"content":"INSTRUCTIONS:\n1. Create a new notebook for one of your subject areas.\n2. Upload at least 3芒聙聯5 varied sources (textbook PDF, your teaching programme, a web article).\n3. Review the Notebook Guide generated automatically.\n4. Ask the notebook 3 test questions to verify the quality of the responses.\n\nVERIFICATION: Responses should include numbered citations that you can click to view the original source. If the responses are vague, add more specific sources.","dur":"15 minutes","icon":"冒聼搂聽","id":"M1-05-en","lang":"en","mod":1,"modTitle":"冒聼搂聽 Module 1: Building the \"Brain\" of Your Subject","obj":"Learn how to create and configure a specialised notebook in NotebookLM, feeding it with high-quality sources to transform it into an expert assistant for your subject area.","order":5,"title":"Practical Activity: Create Your Teaching Notebook","type":"Practical Activity"},{"content":"Drawing exclusively from the uploaded sources, generate a structured summary of the 5 main topics covered by these materials. For each topic, indicate: (1) the central concept, (2) related subtopics, and (3) the specific source in which it is found. Present the information in table format.","dur":"2 minutes","icon":"冒聼搂聽","id":"M1-06-en","lang":"en","mod":1,"modTitle":"冒聼搂聽 Module 1: Building the \"Brain\" of Your Subject","obj":"Learn how to create and configure a specialised notebook in NotebookLM, feeding it with high-quality sources to transform it into an expert assistant for your subject area.","order":6,"title":"Copyable Prompt: Verify the Notebook's Understanding","type":"Copyable Prompt"},{"content":"Analyse all uploaded sources and identify any potential gaps or topics that may be missing in order to fully cover a teaching unit on [TOPIC]. Suggest what type of additional material should be uploaded to complete the notebook.","dur":"2 minutes","icon":"冒聼搂聽","id":"M1-07-en","lang":"en","mod":1,"modTitle":"冒聼搂聽 Module 1: Building the \"Brain\" of Your Subject","obj":"Learn how to create and configure a specialised notebook in NotebookLM, feeding it with high-quality sources to transform it into an expert assistant for your subject area.","order":7,"title":"Copyable Prompt: Identify Gaps in the Material","type":"Copyable Prompt"},{"content":"- Organise notebooks by term or teaching unit; avoid consolidating everything into a single notebook.\n- Name your source files clearly before uploading them (the file name appears as a reference).\n- Review your sources periodically and update them whenever content changes.\n- Share the notebook with departmental colleagues to facilitate collaborative work.\n- Use the \"Pin Note\" function to save the most useful responses as quick references.","dur":"3 minutes","icon":"冒聼搂聽","id":"M1-08-en","lang":"en","mod":1,"modTitle":"冒聼搂聽 Module 1: Building the \"Brain\" of Your Subject","obj":"Learn how to create and configure a specialised notebook in NotebookLM, feeding it with high-quality sources to transform it into an expert assistant for your subject area.","order":8,"title":"Pro Tips for Module 1","type":"Pro Tip"},{"content":"The quality of the material generated by NotebookLM depends directly on how you formulate your requests (prompts). An effective instructional prompt includes:\n\n- CONTEXT: For which educational level and which subject area.\n- FORMAT: How you want the content presented (table, list, narrative text, questions).\n- CONSTRAINTS: Length, complexity, adapted vocabulary.\n- PURPOSE: How it will be used (study, assessment, review, introduction).\n\nMASTER FORMULA FOR INSTRUCTIONAL PROMPTS:\n\"Generate [TYPE OF MATERIAL] on [TOPIC] for [LEVEL] students. The format should be [FORMAT]. It must include [SPECIFIC ELEMENTS]. The tone should be [TONE]. The approximate length is [LENGTH].\"","dur":"5 minutes","icon":"芒職隆","id":"M2-01-en","lang":"en","mod":2,"modTitle":"芒職隆 Module 2: \"Lightning\" Instructional Materials Creation","obj":"Master the use of specific prompts to generate high-quality instructional materials in minutes: summaries, study guides, quizzes, glossaries, and audio podcasts.","order":9,"title":"The Power of Well-Designed Prompts","type":"Explanation"},{"content":"NotebookLM can transform extensive documents into concise summaries adapted to your students' level. Key functionalities:\n\n- Hierarchical summaries: From the general to the specific.\n- Structured study guides: With learning objectives, key concepts, and self-assessment questions.\n- Textual concept maps: Relationships between concepts presented in a clear manner.\n- Review cards: Condensed information for reviewing before examinations.\n\nKEY ADVANTAGE: Since it draws from YOUR sources, the summary is perfectly aligned with what you teach, rather than generic information from the internet.","dur":"5 minutes","icon":"芒職隆","id":"M2-02-en","lang":"en","mod":2,"modTitle":"芒職隆 Module 2: \"Lightning\" Instructional Materials Creation","obj":"Master the use of specific prompts to generate high-quality instructional materials in minutes: summaries, study guides, quizzes, glossaries, and audio podcasts.","order":10,"title":"Type 1 芒聙聯 Summaries and Study Guides","type":"Explanation"},{"content":"Create a comprehensive study guide on [TOPIC] based on the uploaded sources. The guide must include:\n1. Learning objectives (3芒聙聯5 clear objectives)\n2. Summary of key concepts (maximum 500 words)\n3. Essential vocabulary with straightforward definitions\n4. 5 self-assessment questions with their answers\n5. A visual outline in text format connecting the main concepts\n\nAdapt the language for [EDUCATIONAL LEVEL] students. Use an approachable yet academic tone.","dur":"2 minutes","icon":"芒職隆","id":"M2-03-en","lang":"en","mod":2,"modTitle":"芒職隆 Module 2: \"Lightning\" Instructional Materials Creation","obj":"Master the use of specific prompts to generate high-quality instructional materials in minutes: summaries, study guides, quizzes, glossaries, and audio podcasts.","order":11,"title":"Copyable Prompt: Generate a Study Guide","type":"Copyable Prompt"},{"content":"NotebookLM can generate assessments of different types and levels of complexity based on Bloom's Taxonomy:\n\n- REMEMBER: Multiple-choice questions, true/false, fill-in-the-blank.\n- UNDERSTAND: Explanation questions, paraphrasing, classification.\n- APPLY: Practical problems, case studies, application exercises.\n- ANALYSE: Compare and contrast, identify causes and effects.\n- EVALUATE: Critical judgement questions, argumentation, debate.\n- CREATE: Projects, designs, original proposals.\n\nYou may request that the assessment rubric be generated alongside the questions to maintain coherence between what you teach and what you assess.","dur":"5 minutes","icon":"芒職隆","id":"M2-04-en","lang":"en","mod":2,"modTitle":"芒職隆 Module 2: \"Lightning\" Instructional Materials Creation","obj":"Master the use of specific prompts to generate high-quality instructional materials in minutes: summaries, study guides, quizzes, glossaries, and audio podcasts.","order":12,"title":"Type 2 芒聙聯 Quizzes and Assessments","type":"Explanation"},{"content":"Generate an examination on [TOPIC] structured as follows:\n\nSECTION A 芒聙聯 Knowledge (4 points):\n- 5 multiple-choice questions (4 options, only 1 correct)\n- 5 true/false questions with justification\n\nSECTION B 芒聙聯 Comprehension and Application (4 points):\n- 2 short-answer questions (maximum 100 words each)\n- 1 practical problem or case study\n\nSECTION C 芒聙聯 Analysis and Evaluation (2 points):\n- 1 comparative analysis question\n- 1 critical reflection question\n\nInclude the correct answers in a separate section at the end. Add a simplified rubric for Sections B and C.","dur":"2 minutes","icon":"芒職隆","id":"M2-05-en","lang":"en","mod":2,"modTitle":"芒職隆 Module 2: \"Lightning\" Instructional Materials Creation","obj":"Master the use of specific prompts to generate high-quality instructional materials in minutes: summaries, study guides, quizzes, glossaries, and audio podcasts.","order":13,"title":"Copyable Prompt: Generate a Multi-Level Examination","type":"Copyable Prompt"},{"content":"Create a comprehensive glossary of the key terms found in the sources on [TOPIC]. For each term, include:\n- A clear and concise definition (maximum 2 sentences)\n- A practical example or analogy to facilitate understanding\n- Relationship to other terms in the glossary (indicate which ones)\n- Level of importance: ESSENTIAL / IMPORTANT / SUPPLEMENTARY\n\nArrange the terms alphabetically. Mark with an asterisk (*) those that frequently appear in assessments.","dur":"2 minutes","icon":"芒職隆","id":"M2-06-en","lang":"en","mod":2,"modTitle":"芒職隆 Module 2: \"Lightning\" Instructional Materials Creation","obj":"Master the use of specific prompts to generate high-quality instructional materials in minutes: summaries, study guides, quizzes, glossaries, and audio podcasts.","order":14,"title":"Copyable Prompt: Generate an Intelligent Glossary","type":"Copyable Prompt"},{"content":"One of the most innovative features of NotebookLM is the \"Audio Overview\": it generates a conversational podcast in which two AI voices discuss the content of your sources in a natural and instructionally engaging manner.\n\nHOW TO GENERATE IT:\n1. In your notebook, locate the \"Audio Overview\" or \"Generate audio summary\" button.\n2. You may customise the focus before generating.\n3. The audio is generated within a few minutes.\n4. You can download and share it.\n\nINSTRUCTIONAL USES:\n- Review material that students can listen to at any time.\n- Introduction to a new topic prior to the in-person class session (flipped classroom).\n- Accessibility resource for students with reading difficulties.\n- Content to share with families regarding what is being covered in class.","dur":"5 minutes","icon":"芒職隆","id":"M2-07-en","lang":"en","mod":2,"modTitle":"芒職隆 Module 2: \"Lightning\" Instructional Materials Creation","obj":"Master the use of specific prompts to generate high-quality instructional materials in minutes: summaries, study guides, quizzes, glossaries, and audio podcasts.","order":15,"title":"Type 3 芒聙聯 Audio Overview (AI-Generated Educational Podcast)","type":"Explanation"},{"content":"Generate an educational podcast-style conversation focused on [SPECIFIC TOPIC]. The tone should be accessible for [LEVEL] students. Ensure that the conversation:\n- Explains the most challenging concepts using everyday analogies\n- Includes at least 2 practical examples\n- Incorporates rhetorical questions that invite reflection\n- Summarises the key points at the end of the conversation\n- Does not exceed an estimated duration of 10 minutes","dur":"2 minutes","icon":"芒職隆","id":"M2-08-en","lang":"en","mod":2,"modTitle":"芒職隆 Module 2: \"Lightning\" Instructional Materials Creation","obj":"Master the use of specific prompts to generate high-quality instructional materials in minutes: summaries, study guides, quizzes, glossaries, and audio podcasts.","order":16,"title":"Copyable Prompt: Customise an Audio Overview","type":"Copyable Prompt"},{"content":"Using your notebook from Module 1, generate the following materials within 30 minutes:\n\n1. STUDY GUIDE: Use the provided prompt and adapt it to your notebook's topic. Review and adjust the output.\n2. MINI-EXAM: Generate a quiz with 10 varied questions. Verify that the answers are correct by consulting the sources.\n3. GLOSSARY: Create a glossary of at least 15 terms. Confirm that the definitions align with how you teach those concepts.\n4. AUDIO OVERVIEW: Generate a podcast on the central topic. Listen to it and evaluate: Would you use it in class? What would you improve?\n\nREFLECTION: Note how long it would have taken you to create these 4 materials manually versus with NotebookLM.","dur":"30 minutes","icon":"芒職隆","id":"M2-09-en","lang":"en","mod":2,"modTitle":"芒職隆 Module 2: \"Lightning\" Instructional Materials Creation","obj":"Master the use of specific prompts to generate high-quality instructional materials in minutes: summaries, study guides, quizzes, glossaries, and audio podcasts.","order":17,"title":"Practical Activity: Express Materials Laboratory","type":"Practical Activity"},{"content":"- Always review and edit the generated material before distributing it to students. AI is your assistant, not your replacement.\n- Save the prompts that work best in a separate document 芒聙聰 they form your personal \"recipe book.\"\n- If the result is unsatisfactory, reformulate the prompt by being more specific about format, length, and level.\n- Combine materials: use the summary as a basis for the quiz and the glossary as a reference.\n- Audio Overview works best when the notebook contains varied and well-written sources.","dur":"3 minutes","icon":"芒職隆","id":"M2-10-en","lang":"en","mod":2,"modTitle":"芒職隆 Module 2: \"Lightning\" Instructional Materials Creation","obj":"Master the use of specific prompts to generate high-quality instructional materials in minutes: summaries, study guides, quizzes, glossaries, and audio podcasts.","order":18,"title":"Pro Tips for Module 2","type":"Pro Tip"},{"content":"NotebookLM is not merely a content generator 芒聙聰 it is a tool that can enhance active teaching methodologies. The key is to use it as an assistant that helps you design learning experiences, not just static materials.\n\nMETHODOLOGIES IT ENHANCES:\n- Project-Based Learning (PBL): Design of challenges and guides.\n- Flipped Classroom: Pre-class materials and podcasts.\n- Gamification: Creation of challenges, clues, and narratives.\n- Cooperative Learning: Differentiated materials by role.\n- Personalised Teaching: Adaptation by proficiency level.\n- Educational Design Thinking: Creative process guides.","dur":"5 minutes","icon":"冒聼聨炉","id":"M3-01-en","lang":"en","mod":3,"modTitle":"冒聼聨炉 Module 3: Active Methodologies and Personalisation","obj":"Integrate NotebookLM into active methodologies (PBL, Flipped Classroom, Gamification) and learn to personalise learning by adapting content to different levels and needs.","order":19,"title":"NotebookLM as an Engine for Active Methodologies","type":"Explanation"},{"content":"NotebookLM can help you design complete projects in minutes:\n\n1. DESIGN PHASE: Ask the notebook to generate a project based on the uploaded content, including a driving question, phases, deliverables, and assessment criteria.\n2. RESEARCH PHASE: Students can use the notebook (if shared) as a verified primary research source.\n3. CREATION PHASE: Generate detailed rubrics and process guides for each phase of the project.\n4. PRESENTATION PHASE: Create peer assessment and self-assessment guidelines.\n\nKEY BENEFIT: The entire project is anchored in your actual curriculum because it is grounded in your sources.","dur":"5 minutes","icon":"冒聼聨炉","id":"M3-02-en","lang":"en","mod":3,"modTitle":"冒聼聨炉 Module 3: Active Methodologies and Personalisation","obj":"Integrate NotebookLM into active methodologies (PBL, Flipped Classroom, Gamification) and learn to personalise learning by adapting content to different levels and needs.","order":20,"title":"Strategy 1 芒聙聯 Project-Based Learning (PBL)","type":"Explanation"},{"content":"Design a Project-Based Learning (PBL) project for [LEVEL] students based on the content from the uploaded sources. The project must include:\n\n1. CREATIVE TITLE for the project\n2. DRIVING QUESTION that sparks curiosity\n3. REAL-WORLD CONTEXT: Connection to a real-world problem or situation\n4. PROJECT PHASES (4芒聙聯5 phases with estimated duration): For each phase: description, activities, required resources, and deliverable\n5. ROLES for teamwork (4芒聙聯5 roles with responsibilities)\n6. EXPECTED FINAL PRODUCT\n7. ASSESSMENT RUBRIC with 4 levels (Excellent, Good, Satisfactory, In Progress)\n8. CRITERIA for self-assessment and peer assessment\n\nThe project must be achievable within [NUMBER] class sessions.","dur":"2 minutes","icon":"冒聼聨炉","id":"M3-03-en","lang":"en","mod":3,"modTitle":"冒聼聨炉 Module 3: Active Methodologies and Personalisation","obj":"Integrate NotebookLM into active methodologies (PBL, Flipped Classroom, Gamification) and learn to personalise learning by adapting content to different levels and needs.","order":21,"title":"Copyable Prompt: Designing a Complete PBL Project","type":"Copyable Prompt"},{"content":"The Flipped Classroom model fits seamlessly with NotebookLM:\n\nBEFORE CLASS (at home):\n- Generate an Audio Overview as a \"preparation podcast.\"\n- Create a pre-reading guide with guiding questions.\n- Design a short \"entry\" quiz to verify that students engaged with the material.\n\nDURING CLASS (in person):\n- Use class time for practical activities, debates, and addressing questions.\n- The notebook can generate in-depth exercises in real time.\n- Project questions from the notebook for group discussion.\n\nAFTER CLASS (consolidation):\n- Generate personalised reinforcement materials.\n- Create formative follow-up assessments.\n- Design extension activities for students who wish to go further.","dur":"5 minutes","icon":"冒聼聨炉","id":"M3-04-en","lang":"en","mod":3,"modTitle":"冒聼聨炉 Module 3: Active Methodologies and Personalisation","obj":"Integrate NotebookLM into active methodologies (PBL, Flipped Classroom, Gamification) and learn to personalise learning by adapting content to different levels and needs.","order":22,"title":"Strategy 2 芒聙聯 Flipped Classroom with NotebookLM","type":"Explanation"},{"content":"Design a complete Flipped Classroom session on [TOPIC] for [LEVEL]. Structure:\n\nPRE-CLASS (independent student work, 20芒聙聯30 min):\n- Summary of essential content (maximum 1 page)\n- 3 guiding questions to direct reading/listening\n- Short quiz of 5 quick questions (class entry check)\n\nIN CLASS (in-person activities, 50 min):\n- Opening activity: dynamic to identify questions and misconceptions (10 min)\n- Core activity: practical or collaborative exercise (25 min)\n- Group sharing and resolution of questions (15 min)\n\nPOST-CLASS (consolidation, 15 min):\n- 1 individual application exercise\n- 1 metacognitive reflection question\n\nInclude clear instructions for students at each phase.","dur":"2 minutes","icon":"冒聼聨炉","id":"M3-05-en","lang":"en","mod":3,"modTitle":"冒聼聨炉 Module 3: Active Methodologies and Personalisation","obj":"Integrate NotebookLM into active methodologies (PBL, Flipped Classroom, Gamification) and learn to personalise learning by adapting content to different levels and needs.","order":23,"title":"Copyable Prompt: Designing a Flipped Classroom Session","type":"Copyable Prompt"},{"content":"Design a gamified activity on [TOPIC] for [LEVEL] with the following structure:\n\n- NARRATIVE: Create an engaging story or scenario that contextualises the learning (e.g., \"You are investigators who must solve a scientific mystery...\").\n- MISSIONS: 5 progressive challenges (from easy to difficult) based on the content from the sources.\n- POINTS SYSTEM: How points, bonuses, and penalties are earned.\n- CLUES: For each mission, a clue that the teacher may provide if the group gets stuck.\n- ACHIEVEMENTS/BADGES: 3 unlockable achievements awarded for demonstrating mastery.\n- FINAL BOSS: An integrative challenge requiring students to combine what they have learned across all missions.\n\nAll questions and challenges must be strictly based on the content of the sources.","dur":"2 minutes","icon":"冒聼聨炉","id":"M3-06-en","lang":"en","mod":3,"modTitle":"冒聼聨炉 Module 3: Active Methodologies and Personalisation","obj":"Integrate NotebookLM into active methodologies (PBL, Flipped Classroom, Gamification) and learn to personalise learning by adapting content to different levels and needs.","order":24,"title":"Copyable Prompt: Creating a Gamified Activity","type":"Copyable Prompt"},{"content":"One of the greatest challenges in teaching is addressing classroom diversity. NotebookLM enables the rapid generation of materials adapted to different levels:\n\nREMEDIAL LEVEL:\n- Simpler explanations using everyday analogies.\n- More examples and step-by-step guided exercises.\n- Simplified vocabulary.\n\nSTANDARD LEVEL:\n- Material aligned with curricular objectives.\n- Balance between theory and practice.\n\nENRICHMENT LEVEL:\n- Additional content and extension challenges.\n- Interdisciplinary connections.\n- Open-ended questions that promote independent inquiry.\n\nSPECIFIC NEEDS:\n- Texts with simplified language for students with learning difficulties.\n- More visual or schematic versions.\n- Materials with highly structured instructions.","dur":"5 minutes","icon":"冒聼聨炉","id":"M3-07-en","lang":"en","mod":3,"modTitle":"冒聼聨炉 Module 3: Active Methodologies and Personalisation","obj":"Integrate NotebookLM into active methodologies (Project-Based Learning, Flipped Classroom, Gamification) and learn to personalise learning by adapting content to different levels and needs.","order":25,"title":"Personalising Learning with NotebookLM","type":"Explanation"},{"content":"Generate 3 versions of the same material on [TOPIC], adapted to different levels:\n\nVERSION A 芒聙聯 REMEDIAL:\n- Simplified explanation with everyday analogies\n- 3 guided exercises with hints\n- Key vocabulary with straightforward definitions\n- Length: brief, with described visual support\n\nVERSION B 芒聙聯 STANDARD:\n- Complete explanation of the topic\n- 5 medium-difficulty exercises\n- Technical vocabulary with definitions\n- 1 reflection question\n\nVERSION C 芒聙聯 ENRICHMENT:\n- In-depth explanation with interdisciplinary connections\n- 3 challenging exercises + 1 research task\n- Open-ended question for discussion\n- 1 suggested additional resource\n\nAll versions must address the same learning objectives.","dur":"2 minutes","icon":"冒聼聨炉","id":"M3-08-en","lang":"en","mod":3,"modTitle":"冒聼聨炉 Module 3: Active Methodologies and Personalisation","obj":"Integrate NotebookLM into active methodologies (Project-Based Learning, Flipped Classroom, Gamification) and learn to personalise learning by adapting content to different levels and needs.","order":26,"title":"Copyable Prompt: Generating Differentiated Materials by Level","type":"Copyable Prompt"},{"content":"Choose ONE of the following options and develop it using your notebook:\n\nOPTION A 芒聙聯 PROJECT-BASED LEARNING: Use the PBL prompt to design a complete project. Ensure it is realistic and aligned with your curriculum.\n\nOPTION B 芒聙聯 FLIPPED SESSION: Design a complete flipped learning session: generate the Audio Overview, the pre-session guide, and the in-class activities.\n\nOPTION C 芒聙聯 GAMIFICATION: Create a gamified activity with at least 5 missions. Verify that the questions have answers that can be confirmed within the sources.\n\nOPTION D 芒聙聯 PERSONALISATION: Generate differentiated materials (3 levels) for a topic in your subject area. Compare the versions and refine them accordingly.\n\nDELIVERABLE: The complete generated material + a 200-word reflection on how you would implement it in your classroom.","dur":"30 minutes","icon":"冒聼聨炉","id":"M3-09-en","lang":"en","mod":3,"modTitle":"冒聼聨炉 Module 3: Active Methodologies and Personalisation","obj":"Integrate NotebookLM into active methodologies (Project-Based Learning, Flipped Classroom, Gamification) and learn to personalise learning by adapting content to different levels and needs.","order":27,"title":"Practical Activity: Design Your Learning Experience","type":"Practical Activity"},{"content":"- Do not attempt to implement all methodologies at once. Choose one and master it before moving on to another.\n- Share Audio Overviews via a QR code that students can scan.\n- For gamification, you can combine NotebookLM with tools such as Genially, Kahoot, or Classcraft.\n- Personalisation does not mean creating 30 different versions 芒聙聰 3 well-designed levels will address the majority of needs.\n- Ask your students for feedback on the generated materials. Their input is the most valuable quality indicator.\n- Document which prompts and combinations worked best so you can share them with your department.","dur":"3 minutes","icon":"冒聼聨炉","id":"M3-10-en","lang":"en","mod":3,"modTitle":"冒聼聨炉 Module 3: Active Methodologies and Personalisation","obj":"Integrate NotebookLM into active methodologies (Project-Based Learning, Flipped Classroom, Gamification) and learn to personalise learning by adapting content to different levels and needs.","order":28,"title":"Pro Tips for Module 3","type":"Pro Tip"},{"content":"Incorporating AI into education entails significant responsibility. As educators, we serve as role models for our students in the use of technology. The following dimensions must be addressed:\n\n1. ACCURACY: AI can generate incorrect or biased information, even when drawing on sources. Always verify.\n2. AUTHORSHIP AND PLAGIARISM: Who is the author of AI-generated material? How do we distinguish legitimate use from plagiarism?\n3. PRIVACY: Never upload students' personal data or sensitive information to NotebookLM.\n4. EQUITY: Not all students have equal access to technology. Ensure that AI does not widen the digital divide.\n5. TRANSPARENCY: Students must be informed when AI has been used in the creation of materials.\n6. DEPENDENCE: AI is a complement, not a substitute for professional teaching judgement.","dur":"5 minutes","icon":"芒職聳茂赂聫","id":"M4-01-en","lang":"en","mod":4,"modTitle":"芒職聳茂赂聫 Module 4: Ethics and Critical Thinking","obj":"Develop an ethical framework for the use of AI in education, learn to verify and critically evaluate AI responses, and foster critical thinking in both educators and students.","order":29,"title":"Why Is Ethics Essential When Using AI in the Classroom?","type":"Explanation"},{"content":"Although NotebookLM draws on your own sources (which reduces 'hallucinations'), you must ALWAYS verify the following:\n\nVERIFICATION CHECKLIST:\n- Do the numbered citations genuinely correspond to what the original source states?\n- Are there claims not supported by any source?\n- Is the level of complexity appropriate for your students?\n- Are there factual or conceptual errors?\n- Is the information up to date according to your expert knowledge?\n- Is the tone and language appropriate for the educational context?\n- Do the exercises and questions have verifiable correct answers?\n\nGOLDEN RULE: If you cannot personally verify an AI response, do not use it in class. Your expert knowledge as an educator is the final, irreplaceable filter.","dur":"5 minutes","icon":"芒職聳茂赂聫","id":"M4-02-en","lang":"en","mod":4,"modTitle":"芒職聳茂赂聫 Module 4: Ethics and Critical Thinking","obj":"Develop an ethical framework for the use of AI in education, learn to verify and critically evaluate AI responses, and foster critical thinking in both educators and students.","order":30,"title":"Critical Verification of AI Responses","type":"Explanation"},{"content":"Critically review your last response and identify the following:\n1. Which claims are directly supported by the sources? Indicate the specific source.\n2. Are there any claims you have inferred or extrapolated without direct basis in the sources? Identify them.\n3. Are there potential biases or limited perspectives in the generated material?\n4. What important information on the topic is NOT covered by the available sources?\n5. What level of confidence (high/medium/low) would you assign to each section of your response?\n\nBe honest and rigorous in this self-assessment.","dur":"2 minutes","icon":"芒職聳茂赂聫","id":"M4-03-en","lang":"en","mod":4,"modTitle":"芒職聳茂赂聫 Module 4: Ethics and Critical Thinking","obj":"Develop an ethical framework for the use of AI in education, learn to verify and critically evaluate AI responses, and foster critical thinking in both educators and students.","order":31,"title":"Copyable Prompt: Auditing AI Responses","type":"Copyable Prompt"},{"content":"It is not sufficient to use AI critically yourself 芒聙聰 you must also teach your students to do so. The VERIFY Framework for students:\n\nV 芒聙聯 VERIFY: Does the information align with other reliable sources?\nE 芒聙聯 EVALUATE: Who created the original content? Is it an authoritative source?\nR 芒聙聯 REASON: Is the response logical? Are the arguments well constructed?\nI 芒聙聯 IDENTIFY: Are there biases, omissions, or excessive simplifications?\nF 芒聙聯 FIND EVIDENCE: Can I find independent evidence to support this?\nY 芒聙聯 AND ASK: What else do I need to know that AI has not told me?\n\nCLASSROOM ACTIVITY: Provide students with an AI-generated response (containing intentional errors) and ask them to evaluate it using the VERIFY Framework.","dur":"5 minutes","icon":"芒職聳茂赂聫","id":"M4-04-en","lang":"en","mod":4,"modTitle":"芒職聳茂赂聫 Module 4: Ethics and Critical Thinking","obj":"Develop an ethical framework for the use of AI in education, learn to verify and critically evaluate AI responses, and foster critical thinking in both educators and students.","order":32,"title":"Teaching Students to Think Critically About AI","type":"Explanation"},{"content":"Proposed principles for establishing an AI policy in the classroom:\n\n1. TRANSPARENCY: Always inform when AI is used to create materials.\n2. HUMAN OVERSIGHT: All AI-generated content must be reviewed by the teacher.\n3. PRIVACY FIRST: Never upload students' personal data to AI tools.\n4. AI AS A TOOL: AI assists; it does not replace the learning process.\n5. EQUITY OF ACCESS: Ensure that all students have equal access.\n6. CRITICAL THINKING: Actively teach students to question AI responses.\n7. PROTECTED CREATIVITY: Students' original creative work must be valued above AI-generated content.\n8. CONTINUOUS PROFESSIONAL DEVELOPMENT: Teaching staff must continuously update their knowledge of the ethical use of AI.\n\nSUGGESTION: Adapt these principles and present them to your faculty or department as a starting point for an institutional policy.","dur":"5 minutes","icon":"芒職聳茂赂聫","id":"M4-05-en","lang":"en","mod":4,"modTitle":"芒職聳茂赂聫 Module 4: Ethics and Critical Thinking","obj":"Develop an ethical framework for the use of AI in education, learn to verify and question AI responses, and foster critical thinking in both educators and students.","order":33,"title":"Ethical Framework for the Use of AI in Your Educational Institution","type":"Explanation"},{"content":"Drawing on the available sources, generate materials for a classroom debate on ethics and AI in education. Include:\n\n1. CASE STUDY: Describe a realistic scenario in which a student uses AI in a questionable manner (e.g., submitting AI-generated work as their own).\n2. DISCUSSION QUESTIONS (5芒聙聯7 questions): Questions that present genuine dilemmas rather than obvious answers, and that invite consideration of multiple perspectives.\n3. ARGUMENTS FOR AND AGAINST the use of AI by students (at least 3 on each side).\n4. GUIDING CONCLUSIONS: Principles that could inform a \"responsible use code\" created by the students themselves.\n\nThe materials should promote reflection rather than impose a single viewpoint.","dur":"2 minutes","icon":"芒職聳茂赂聫","id":"M4-06-en","lang":"en","mod":4,"modTitle":"芒職聳茂赂聫 Module 4: Ethics and Critical Thinking","obj":"Develop an ethical framework for the use of AI in education, learn to verify and question AI responses, and foster critical thinking in both educators and students.","order":34,"title":"Copyable Prompt: Generating an Ethical Debate on AI in the Classroom","type":"Copyable Prompt"},{"content":"Conduct a comprehensive audit of your work with NotebookLM:\n\n1. CONTENT VERIFICATION: Take the last material you generated and apply the verification checklist. Identify at least 2 points that require human review.\n2. BIAS TEST: Ask the notebook to explain a topic from two different perspectives. Does it present both in a balanced manner?\n3. PRIVACY CHECK: Review all uploaded sources: does any contain students' personal data? If so, delete it immediately.\n4. VERIFY EXERCISE: Generate a response on a topic you know well. Apply the VERIFY framework as though you were a student. Document your findings.\n\nDELIVERABLE: A brief report (1 page) summarising the findings of your audit and outlining a 3-action plan to improve your ethical use of AI.","dur":"20 minutes","icon":"芒職聳茂赂聫","id":"M4-07-en","lang":"en","mod":4,"modTitle":"芒職聳茂赂聫 Module 4: Ethics and Critical Thinking","obj":"Develop an ethical framework for the use of AI in education, learn to verify and question AI responses, and foster critical thinking in both educators and students.","order":35,"title":"Practical Activity: Ethical Audit of Your Notebook","type":"Practical Activity"},{"content":"- Verification is not optional 芒聙聰 it is an integral part of the AI workflow.\n- Foster a classroom culture in which questioning AI is both natural and valued.\n- Document the errors you identify in NotebookLM responses. They serve as excellent teaching examples.\n- Update your AI policy at least once a year 芒聙聰 technology evolves rapidly.\n- Involve families and school administration in conversations about AI in the classroom.\n- Remember: the most effective AI in the classroom remains your own professional judgement as an educator.","dur":"3 minutes","icon":"芒職聳茂赂聫","id":"M4-08-en","lang":"en","mod":4,"modTitle":"芒職聳茂赂聫 Module 4: Ethics and Critical Thinking","obj":"Develop an ethical framework for the use of AI in education, learn to verify and question AI responses, and foster critical thinking in both educators and students.","order":36,"title":"Pro Tips for Module 4","type":"Pro Tip"},{"content":"Create a COMPLETE TEACHING NOTEBOOK for a real instructional unit in your subject area. This project integrates all the competencies developed throughout the mini-course and should constitute a resource that you can use directly in your teaching practice.\n\nThis assignment is the culmination of the course \"NotebookLM for Educators: Enhancing the Classroom with AI\" and will enable you to demonstrate that you can use this tool effectively, creatively, and ethically.","dur":"10 minutes","icon":"冒聼聫聠","id":"TF-01-en","lang":"en","mod":5,"modTitle":"冒聼聫聠 Final Assignment: Your Complete Teaching Notebook","obj":"Integrate everything learned across the 4 modules by creating a complete and fully functional teaching notebook, ready for classroom use, that demonstrates mastery of all course competencies.","order":37,"title":"Final Assignment Description","type":"Final Assignment"},{"content":"Your complete teaching notebook must include:\n\nREQUIREMENT 1 芒聙聯 CONFIGURED NOTEBOOK (Module 1):\n- Notebook created with a descriptive name.\n- Minimum of 5 quality sources uploaded (varied by type).\n- Notebook guide reviewed and verified.\n\nREQUIREMENT 2 芒聙聯 INSTRUCTIONAL MATERIALS (Module 2):\n- 1 complete study guide.\n- 1 multi-level exam or assessment.\n- 1 glossary of at least 15 terms.\n- 1 Audio Overview generated and evaluated.\n\nREQUIREMENT 3 芒聙聯 ACTIVE METHODOLOGY (Module 3):\n- 1 activity designed using an active methodology (PBL, Flipped Classroom, Gamification, or other).\n- 1 differentiated resource at a minimum of 2 levels.\n\nREQUIREMENT 4 芒聙聯 ETHICS AND VERIFICATION (Module 4):\n- Documented audit of at least 1 generated resource.\n- Reflection on ethical use (minimum 300 words).\n- Application of the VERIFY framework to one notebook response.","dur":"60 minutes","icon":"冒聼聫聠","id":"TF-02-en","lang":"en","mod":5,"modTitle":"冒聼聫聠 Final Assignment: Your Complete Teaching Notebook","obj":"Integrate everything learned across the 4 modules by creating a complete and fully functional teaching notebook, ready for classroom use, that demonstrates mastery of all course competencies.","order":38,"title":"Project Requirements","type":"Final Assignment"},{"content":"EXCELLENT (9芒聙聯10):\n- All sections complete and of high quality.\n- Materials directly usable in the classroom.\n- In-depth and personal ethical reflection.\n- Creativity in the design of the active methodology.\n- Clear evidence of verification and critical thinking.\n\nGOOD (7芒聙聯8):\n- All sections present.\n- Functional materials requiring only minor adjustments.\n- Adequate ethical reflection.\n- Well-designed active methodology.\n\nSATISFACTORY (5芒聙聯6):\n- Most sections present.\n- Basic but functional materials.\n- Superficial ethical reflection.\n- Straightforward active methodology.\n\nIN PROGRESS (1芒聙聯4):\n- Sections incomplete or absent.\n- Materials requiring significant revision.\n- No ethical reflection or verification.\n\nSUBMISSION DEADLINE: As per the course calendar.\nFORMAT: Link to the NotebookLM notebook + document containing the generated materials and the ethical reflection.","dur":"5 minutes","icon":"冒聼聫聠","id":"TF-03-en","lang":"en","mod":5,"modTitle":"冒聼聫聠 Final Assignment: Your Complete Teaching Notebook","obj":"Integrate everything learned across the 4 modules by creating a complete and fully functional teaching notebook, ready for classroom use, that demonstrates mastery of all course competencies.","order":39,"title":"Assessment Rubric","type":"Final Assignment"},{"content":"Act as an expert educational evaluator. Review all the content of this notebook and assess the following:\n\n1. COVERAGE: Do the materials adequately address the learning objectives of the unit?\n2. COHERENCE: Is there alignment between the study guide, the assessment, and the glossary?\n3. LEVEL: Are the language and difficulty appropriate for the indicated educational level?\n4. QUALITY: Are the exercises and questions clear, relevant, and well-formulated?\n5. GAPS: Are there important aspects of the topic that have not been addressed?\n\nProvide a score from 1芒聙聯10 for each criterion along with specific suggestions for improvement.","dur":"2 minutes","icon":"冒聼聫聠","id":"TF-04-en","lang":"en","mod":5,"modTitle":"冒聼聫聠 Final Assignment: Your Complete Teaching Notebook","obj":"Integrate everything learned across the 4 modules by creating a complete and fully functional teaching notebook, ready for classroom use, that demonstrates mastery of all course competencies.","order":40,"title":"Copyable Prompt: Self-Assessment of Your Teaching Notebook","type":"Copyable Prompt"},{"content":"- Start with what you already have: upload materials you currently use and enhance them with AI.\n- Do not seek perfection in the first iteration. Generate, review, improve, repeat.\n- Ask a colleague to review your notebook 芒聙聰 a fresh perspective will catch what you might overlook.\n- Save a copy of the best prompts you discover throughout the process.\n- Remember: the goal is not for AI to do your work, but to free up your time for what matters most: connecting with your students.\n\nCongratulations on completing the mini-course! You now have the tools to transform your teaching practice with AI in a responsible and effective manner.","dur":"5 minutes","icon":"冒聼聫聠","id":"TF-05-en","lang":"en","mod":5,"modTitle":"冒聼聫聠 Final Assignment: Your Complete Teacher Notebook","obj":"Integrate everything learned across the 4 modules by creating a complete and functional teacher notebook, ready for classroom use, demonstrating mastery of all course competencies.","order":41,"title":"Final Tips for Success","type":"Pro Tip"},{"content":"NotebookLM ist ein KI-gest脙录tztes Tool von Google (basierend auf Gemini), das die Erstellung intelligenter Arbeitsbereiche erm脙露glicht, die mit IHREN eigenen Dokumenten gespeist werden. Im Gegensatz zu generischen Diensten wie ChatGPT oder Gemini antwortet NotebookLM AUSSCHLIESSLICH auf der Grundlage der von Ihnen hochgeladenen Quellen. Das bedeutet: fundierte Antworten (keine erfundenen Inhalte), 脙录berpr脙录fbare Zitate mit Verweisen auf Ihre Dokumente sowie ein auf Ihr Fach spezialisiertes 芒聙聻k脙录nstliches Gehirn\". Stellen Sie sich vor, Sie h脙陇tten einen Lehrassistenten, der S脙聞MTLICHES Ihrer Unterrichtsmaterial gelesen hat und in der Lage ist, Fragen zu beantworten, Zusammenfassungen zu erstellen und Inhalte ausschlie脙聼lich auf Grundlage Ihres Lehrplans zu generieren.","dur":"10 Minuten","icon":"冒聼搂聽","id":"M1-01-de","lang":"de","mod":1,"modTitle":"冒聼搂聽 Modul 1: Das 芒聙聻Gehirn\" Ihres Unterrichtsfachs aufbauen","obj":"Erlernen der Erstellung und Konfiguration eines spezialisierten Notebooks in NotebookLM, das mit hochwertigen Quellen gespeist wird, um es zu einem fachkundigen Assistenten f脙录r Ihr Unterrichtsfach zu machen.","order":1,"title":"Was ist NotebookLM und warum ist es revolution脙陇r f脙录r Lehrkr脙陇fte?","type":"Erl脙陇uterung"},{"content":"1. Rufen Sie notebooklm.google.com mit Ihrem Google-Konto auf (vorzugsweise das institutionelle Konto).\n2. Klicken Sie auf 芒聙聻Neues Notebook\" (+ New Notebook).\n3. Vergeben Sie einen beschreibenden Namen, zum Beispiel: 芒聙聻Biologie 9. Klasse 芒聙聯 Zelle und Genetik\" oder 芒聙聻Geschichte Abitur 芒聙聯 20. Jahrhundert\".\n\nWICHTIG: Jedes Notebook ist ein isolierter Arbeitsbereich. Erstellen Sie jeweils eines pro Unterrichtsfach, Unterrichtseinheit oder Projekt. So bleiben die Antworten der KI fokussiert und pr脙陇zise.","dur":"5 Minuten","icon":"冒聼搂聽","id":"M1-02-de","lang":"de","mod":1,"modTitle":"冒聼搂聽 Modul 1: Das 芒聙聻Gehirn\" Ihres Unterrichtsfachs aufbauen","obj":"Erlernen der Erstellung und Konfiguration eines spezialisierten Notebooks in NotebookLM, das mit hochwertigen Quellen gespeist wird, um es zu einem fachkundigen Assis rlb();rct();rst();R();
