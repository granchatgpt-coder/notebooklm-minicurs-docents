<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NotebookLM per a Docents: Potenciant l'Aula amb IA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#4F46E5;--primary-light:#818CF8;--primary-dark:#3730A3;--bg:#F8FAFC;--card:#FFFFFF;--text:#1E293B;--text-light:#64748B;--border:#E2E8F0;--success:#10B981;--warning:#F59E0B;--accent:#EC4899;--shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);--shadow-lg:0 10px 15px -3px rgba(0,0,0,.1),0 4px 6px -2px rgba(0,0,0,.05)}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.header{background:linear-gradient(135deg,var(--primary-dark),var(--primary),var(--primary-light));color:#fff;padding:2rem 1rem;text-align:center;position:sticky;top:0;z-index:100;box-shadow:var(--shadow-lg)}
.header h1{font-size:1.5rem;font-weight:700;margin-bottom:.25rem}
.header p{font-size:.85rem;opacity:.9}
.lang-bar{display:flex;justify-content:center;gap:.5rem;margin-top:1rem;flex-wrap:wrap}
.lang-btn{padding:.4rem 1rem;border-radius:2rem;border:2px solid rgba(255,255,255,.4);background:transparent;color:#fff;cursor:pointer;font-size:.8rem;font-weight:600;transition:all .2s}
.lang-btn:hover,.lang-btn.active{background:#fff;color:var(--primary);border-color:#fff}
.controls{background:var(--card);padding:1rem;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:90;display:flex;gap:.75rem;flex-wrap:wrap;justify-content:center;align-items:center}
.filter-btn{padding:.35rem .85rem;border-radius:1.5rem;border:1px solid var(--border);background:var(--card);color:var(--text-light);cursor:pointer;font-size:.75rem;transition:all .2s;white-space:nowrap}
.filter-btn:hover{border-color:var(--primary);color:var(--primary)}
.filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.container{max-width:900px;margin:0 auto;padding:1rem}
.stats{display:flex;gap:1rem;justify-content:center;padding:.75rem;flex-wrap:wrap}
.stat{background:var(--card);padding:.5rem 1rem;border-radius:.5rem;font-size:.75rem;color:var(--text-light);box-shadow:var(--shadow)}
.stat strong{color:var(--primary);font-size:1rem}
.module-group{margin-bottom:2rem}
.module-header{background:var(--card);border-radius:.75rem;padding:1.25rem;margin-bottom:.75rem;box-shadow:var(--shadow);border-left:4px solid var(--primary)}
.module-header h2{font-size:1.1rem;color:var(--text);margin-bottom:.25rem}
.module-header .meta{font-size:.8rem;color:var(--text-light);display:flex;gap:1rem;flex-wrap:wrap}
.card{background:var(--card);border-radius:.75rem;padding:1rem 1.25rem;margin-bottom:.6rem;box-shadow:var(--shadow);border-left:4px solid transparent;transition:all .2s}
.card:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px)}
.card.explicacio{border-left-color:#3B82F6}
.card.activitat{border-left-color:#10B981}
.card.prompt{border-left-color:#F59E0B}
.card.consell{border-left-color:#8B5CF6}
.card.tasca{border-left-color:#EC4899}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem}
.card-title{font-size:.95rem;font-weight:600;color:var(--text)}
.badge{padding:.15rem .6rem;border-radius:1rem;font-size:.65rem;font-weight:600;white-space:nowrap}
.badge.explicacio{background:#DBEAFE;color:#1D4ED8}
.badge.activitat{background:#D1FAE5;color:#065F46}
.badge.prompt{background:#FEF3C7;color:#92400E}
.badge.consell{background:#EDE9FE;color:#5B21B6}
.badge.tasca{background:#FCE7F3;color:#9D174D}
.card-content{font-size:.85rem;color:var(--text);white-space:pre-wrap;line-height:1.7}
.card-meta{display:flex;gap:.75rem;margin-top:.5rem;font-size:.7rem;color:var(--text-light)}
.loading{text-align:center;padding:4rem;color:var(--text-light)}
.loading .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{text-align:center;padding:2rem;color:var(--text-light);font-size:.75rem;border-top:1px solid var(--border);margin-top:2rem}
.copy-btn{background:none;border:1px solid var(--border);border-radius:.35rem;padding:.2rem .5rem;font-size:.65rem;cursor:pointer;color:var(--text-light);transition:all .2s;margin-left:.5rem}
.copy-btn:hover{border-color:var(--primary);color:var(--primary)}
.copy-btn.copied{background:var(--success);color:#fff;border-color:var(--success)}
.no-results{text-align:center;padding:3rem;color:var(--text-light)}
.progress{height:4px;background:var(--border);border-radius:2px;margin-top:.5rem;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--primary),var(--primary-light));border-radius:2px;transition:width .5s}
@media(max-width:640px){.header h1{font-size:1.2rem}.container{padding:.5rem}.card{padding:.85rem}}
</style>
</head>
<body>
<div class="header">
<h1>ð NotebookLM per a Docents</h1>
<p>Potenciant l'Aula amb IntelÂ·ligÃ¨ncia Artificial</p>
<div class="lang-bar" id="langBar"></div>
</div>
<div class="controls" id="controls"></div>
<div class="stats" id="stats"></div>
<div class="container" id="app">
<div class="loading"><div class="spinner"></div>Carregant contingut...</div>
</div>
<div class="footer">
<p>Minicurs PrisMa &mdash; 287 registres &bull; 7 idiomes &bull; 5 m&ograve;duls</p>
<p style="margin-top:.5rem">&copy; 2025 NotebookLM per a Docents. Plataforma de formaci&oacute; PrisMa.</p>
</div>
<script>
const SHEET_ID='1llyx9w1BdxngyeQB77YLrH2EJA_IqaVx_Vd7OhJbnUs';
const LANGS={ca:'Catal\u00e0',es:'Castellano',eu:'Euskara',gl:'Galego',fr:'Fran\u00e7ais',en:'English',de:'Deutsch'};
const TYPE_MAP={'Explicaci\u00f3':'explicacio','Activitat Pr\u00e0ctica':'activitat','Prompt Copiable':'prompt','Consell Pro':'consell','Tasca Final':'tasca',
'Explicaci\u00f3n':'explicacio','Actividad Pr\u00e1ctica':'activitat','Prompt Copiable':'prompt','Consejo Pro':'consell','Tarea Final':'tasca',
'Azalpena':'explicacio','Jarduera Praktikoa':'activitat','Prompt Kopiagarria':'prompt','Aholku Profesionala':'consell','Azken Ataza':'tasca',
'Explicaci\u00f3n':'explicacio','Actividade Pr\u00e1ctica':'activitat','Consello Pro':'consell','Tarefa Final':'tasca',
'Explication':'explicacio','Activit\u00e9 Pratique':'activitat','Prompt \u00e0 Copier':'prompt','Conseil Pro':'consell','T\u00e2che Finale':'tasca',
'Explanation':'explicacio','Practical Activity':'activitat','Copyable Prompt':'prompt','Pro Tip':'consell','Final Task':'tasca',
'Erkl\u00e4rung':'explicacio','Praktische Aktivit\u00e4t':'activitat','Kopierbarer Prompt':'prompt','Profi-Tipp':'consell','Abschlussaufgabe':'tasca'};
const TYPE_LABELS={ca:{explicacio:'Explicaci\u00f3',activitat:'Activitat Pr\u00e0ctica',prompt:'Prompt Copiable',consell:'Consell Pro',tasca:'Tasca Final'},
es:{explicacio:'Explicaci\u00f3n',activitat:'Actividad Pr\u00e1ctica',prompt:'Prompt Copiable',consell:'Consejo Pro',tasca:'Tarea Final'},
eu:{explicacio:'Azalpena',activitat:'Jarduera Praktikoa',prompt:'Prompt Kopiagarria',consell:'Aholku Profesionala',tasca:'Azken Ataza'},
gl:{explicacio:'Explicaci\u00f3n',activitat:'Actividade Pr\u00e1ctica',prompt:'Prompt Copiable',consell:'Consello Pro',tasca:'Tarefa Final'},
fr:{explicacio:'Explication',activitat:'Activit\u00e9 Pratique',prompt:'Prompt \u00e0 Copier',consell:'Conseil Pro',tasca:'T\u00e2che Finale'},
en:{explicacio:'Explanation',activitat:'Practical Activity',prompt:'Copyable Prompt',consell:'Pro Tip',tasca:'Final Task'},
de:{explicacio:'Erkl\u00e4rung',activitat:'Praktische Aktivit\u00e4t',prompt:'Kopierbarer Prompt',consell:'Profi-Tipp',tasca:'Abschlussaufgabe'}};
let allData=[],currentLang='ca',activeModule='all',activeType='all';

function parseCSV(t){
  const r=[];let i=0;
  while(i<t.length&&t[i]!=='\n')i++;i++;
  while(i<t.length){
    if(i>=t.length||t.substring(i).trim()==='')break;
    const f=[];let fc=0;
    while(fc<11&&i<t.length){
      if(t[i]==='"'){i++;let v='';
        while(i<t.length){if(t[i]==='"'){if(i+1<t.length&&t[i+1]==='"'){v+='"';i+=2}else{i++;break}}else{v+=t[i];i++}}
        f.push(v);if(i<t.length&&t[i]===',')i++;else if(i<t.length&&t[i]==='\r'){i++;if(i<t.length&&t[i]==='\n')i++}else if(i<t.length&&t[i]==='\n')i++;
      }else{let v='';while(i<t.length&&t[i]!==','&&t[i]!=='\r'&&t[i]!=='\n'){v+=t[i];i++}
        f.push(v);if(i<t.length&&t[i]===',')i++;else if(i<t.length&&t[i]==='\r'){i++;if(i<t.length&&t[i]==='\n')i++}else if(i<t.length&&t[i]==='\n')i++;}
      fc++}
    if(f.length>=10&&f[0].match(/^M|^TF/))r.push({id:f[0],lang:f[1],mod:parseInt(f[2]),icon:f[3],modTitle:f[4],obj:f[5],dur:f[6],type:f[7],title:f[8],content:f[9],order:parseInt(f[10])||0});
  }return r;
}

async function loadData(){
  try{
    const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;
    const res=await fetch(url);
    if(!res.ok)throw new Error('Sheet fetch failed');
    const csv=await res.text();
    allData=parseCSV(csv);
  }catch(e){
    console.warn('Sheet load failed, trying embedded data',e);
    try{
      const res=await fetch('data.json');
      if(res.ok)allData=await res.json();
    }catch(e2){console.error('All data sources failed',e2)}
  }
  if(allData.length>0){init()}
  else{document.getElementById('app').innerHTML='<div class="no-results">Error carregant les dades. Proveu de recarregar la p\u00e0gina.</div>'}
}

function init(){
  renderLangBar();renderControls();renderStats();render();
}

function renderLangBar(){
  const bar=document.getElementById('langBar');
  bar.innerHTML=Object.entries(LANGS).map(([code,name])=>
    `<button class="lang-btn ${code===currentLang?'active':''}" onclick="setLang('${code}')">${name}</button>`
  ).join('');
}

function setLang(l){currentLang=l;activeModule='all';activeType='all';renderLangBar();renderControls();renderStats();render()}

function renderControls(){
  const recs=allData.filter(r=>r.lang===currentLang);
  const mods=[...new Map(recs.map(r=>[r.mod,{num:r.mod,icon:r.icon,title:r.modTitle}])).values()].sort((a,b)=>a.num-b.num);
  const types=[...new Set(recs.map(r=>getTypeKey(r.type)))];
  const tl=TYPE_LABELS[currentLang]||TYPE_LABELS.ca;
  let html='<div style="display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center">';
  html+=`<button class="filter-btn ${activeModule==='all'?'active':''}" onclick="setModule('all')">Tots els m\u00f2duls</button>`;
  mods.forEach(m=>{html+=`<button class="filter-btn ${activeModule==m.num?'active':''}" onclick="setModule(${m.num})">${m.icon} M${m.num}</button>`});
  html+='</div><div style="display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center;margin-top:.5rem">';
  html+=`<button class="filter-btn ${activeType==='all'?'active':''}" onclick="setType('all')">Tots els tipus</button>`;
  types.forEach(t=>{html+=`<button class="filter-btn ${t} ${activeType===t?'active':''}" onclick="setType('${t}')">${tl[t]||t}</button>`});
  html+='</div>';
  document.getElementById('controls').innerHTML=html;
}

function getTypeKey(t){return TYPE_MAP[t]||'explicacio'}

function setModule(m){activeModule=m;renderControls();renderStats();render()}
function setType(t){activeType=t;renderControls();renderStats();render()}

function getFiltered(){
  let recs=allData.filter(r=>r.lang===currentLang);
  if(activeModule!=='all')recs=recs.filter(r=>r.mod==activeModule);
  if(activeType!=='all')recs=recs.filter(r=>getTypeKey(r.type)===activeType);
  return recs.sort((a,b)=>a.mod-b.mod||a.order-b.order);
}

function renderStats(){
  const total=allData.filter(r=>r.lang===currentLang).length;
  const filtered=getFiltered().length;
  const mods=new Set(getFiltered().map(r=>r.mod)).size;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><strong>${filtered}</strong> / ${total} continguts</div>
    <div class="stat"><strong>${mods}</strong> m\u00f2duls</div>
    <div class="stat"><strong>287</strong> registres totals</div>`;
}

function render(){
  const recs=getFiltered();
  if(!recs.length){document.getElementById('app').innerHTML='<div class="no-results">No hi ha continguts amb els filtres seleccionats.</div>';return}
  const groups={};
  recs.forEach(r=>{if(!groups[r.mod])groups[r.mod]={icon:r.icon,title:r.modTitle,obj:r.obj,items:[]};groups[r.mod].items.push(r)});
  let html='';
  Object.keys(groups).sort((a,b)=>a-b).forEach(mod=>{
    const g=groups[mod];
    const total=allData.filter(r=>r.lang===currentLang&&r.mod==mod).length;
    const shown=g.items.length;
    html+=`<div class="module-group">
      <div class="module-header">
        <h2>${g.title}</h2>
        <div class="meta"><span>\ud83c\udfaf ${g.obj}</span></div>
        <div class="progress"><div class="progress-bar" style="width:${Math.round(shown/total*100)}%"></div></div>
      </div>`;
    g.items.forEach(r=>{
      const tk=getTypeKey(r.type);
      const tl=TYPE_LABELS[currentLang]||TYPE_LABELS.ca;
      const isPrompt=tk==='prompt';
      html+=`<div class="card ${tk}">
        <div class="card-header">
          <div class="card-title">${r.title}</div>
          <span class="badge ${tk}">${tl[tk]||r.type}</span>
        </div>
        <div class="card-content">${escapeHtml(r.content)}${isPrompt?`<button class="copy-btn" onclick="copyText(this,'${escapeAttr(r.content)}')">\ud83d\udccb Copiar</button>`:''}</div>
        <div class="card-meta"><span>\u23f1 ${r.dur}</span><span>#${r.order}</span></div>
      </div>`;
    });
    html+='</div>';
  });
  document.getElementById('app').innerHTML=html;
}

function escapeHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function escapeAttr(t){return t.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n').replace(/"/g,'&quot;')}

function copyText(btn,text){
  const t=text.replace(/\\n/g,'\n').replace(/\\'/g,"'").replace(/\\\\/g,'\\');
  navigator.clipboard.writeText(t).then(()=>{btn.textContent='\u2705 Copiat!';btn.classList.add('copied');setTimeout(()=>{btn.textContent='\ud83d\udccb Copiar';btn.classList.remove('copied')},2000)});
}

loadData();
</script>
</body>
</html>
